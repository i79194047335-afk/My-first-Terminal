function renderBriefing() {
    const content = document.getElementById("briefContent");
    if (!content) return;

    if (!lastBriefingData || !lastBriefingData.pairs) {
        content.innerHTML =
            "<div style='color:#888;text-align:center;margin-top:40px'>" +
            "Нет данных брифинга</div>";
        return;
    }

    const pairData = lastBriefingData.pairs[currentSymbol];
    if (!pairData) {
        content.innerHTML =
            "<div style='color:#888;text-align:center;margin-top:40px'>" +
            "Нет брифинга для " + currentSymbol + "</div>";
        return;
    }

    const meta = lastBriefingData.meta || {};
    const globalCtx = lastBriefingData.global_context || {};

    const dir = (pairData.direction || "NEUTRAL").toLowerCase();
    const dirClass = dir === "up" ? "bias-up" : dir === "down" ? "bias-down" : "bias-neutral";
    const arrow = dir === "up" ? "▲" : dir === "down" ? "▼" : "◆";
    const dirLabel = dir === "up" ? "BULLISH" : dir === "down" ? "BEARISH" : "NEUTRAL";

    const fmtLevel = function(v) {
        if (typeof v === "number") return v.toFixed(5);
        return String(v);
    };
    const supports = (pairData.support_levels || []).map(fmtLevel).join(", ");
    const resistances = (pairData.resistance_levels || []).map(fmtLevel).join(", ");

    let staleHtml = "";
    if (meta.generated_ts) {
        const ageHours = (Date.now() / 1000 - meta.generated_ts) / 3600;
        if (ageHours > 13) {
            staleHtml = "<div style='color:#ff8a80;font-size:10px;margin-top:6px'>" +
                "⚠️ Брифинг устарел (" + Math.round(ageHours) + " ч назад)</div>";
        }
    }

    let html = "";

    // Форматируем время в UTC+5
    let timeStr = "N/A";
    if (meta.generated_ts) {
        const d = new Date((meta.generated_ts + TZ_OFFSET * 3600) * 1000);
        const hh = String(d.getUTCHours()).padStart(2, "0");
        const mm = String(d.getUTCMinutes()).padStart(2, "0");
        const dd = String(d.getUTCDate()).padStart(2, "0");
        const MM = String(d.getUTCMonth() + 1).padStart(2, "0");
        timeStr = hh + ":" + mm + " UTC+5 (" + dd + "." + MM + ")";
    }

    // Сессия: в открытый рынок — «Лондонская (08:00–17:00 UTC)»; в закрытый
    // (выходные) — честная пометка «рынок закрыт — обзор к открытию» вместо
    // ложной «текущей сессии», которой в выходные нет.
    const sessionLabel = (meta.market_open === false)
        ? "🔒 Рынок закрыт — обзор к открытию"
        : "📅 " + (meta.session_label_ru || meta.session_label || meta.session || "") +
          " (" + (meta.session_start_utc || "") + "–" + (meta.session_end_utc || "") + " UTC)";
    html += "<div class='meta'>" +
        sessionLabel +
        " | 🕐 Составлен: " + timeStr +
        " | Волатильность: " + (globalCtx.session_volatility || "N/A") +
        " | Риск: " + (globalCtx.risk_appetite || "N/A") +
        "</div>";

    html += "<h2>" + currentSymbol +
        " <span class='" + dirClass + "' style='font-size:16px;margin-left:8px'>" +
        arrow + " " + dirLabel + " (conf: " + (pairData.direction_confidence || "?") + "/5)" +
        "</span></h2>";

    html += staleHtml;

    // Повалютный bias убран: дублировал попарные направления и путал
    // (обе валюты пары могли выйти BULLISH одновременно). Направление теперь
    // ясно из «Консенсус аналитиков» + «Мысль DeepSeek».

    html += "<div class='section'>" +
        "<div class='section-title'>Технический анализ</div>" +
        "<div>" + (pairData.technical_summary || "Нет данных.") + "</div>" +
        "</div>";

    // Консенсус аналитиков и мысль DeepSeek — раздельно (новый формат брифинга).
    // Показываем, только если движок их дал (старый формат их не имеет).
    const biasBadge = function(d) {
        const x = (d || "NEUTRAL").toUpperCase();
        const cls = x === "UP" ? "bias-up" : x === "DOWN" ? "bias-down" : "bias-neutral";
        const ar  = x === "UP" ? "▲" : x === "DOWN" ? "▼" : "◆";
        const lbl = x === "UP" ? "BULLISH" : x === "DOWN" ? "BEARISH" : "NEUTRAL";
        return "<span class='" + cls + "'>" + ar + " " + lbl + "</span>";
    };
    if (pairData.consensus_view || pairData.consensus_direction) {
        html += "<div class='section'>" +
            "<div class='section-title'>Консенсус аналитиков " +
            biasBadge(pairData.consensus_direction) + "</div>" +
            "<div>" + (pairData.consensus_view || "—") + "</div>" +
            "</div>";
    }
    if (pairData.deepseek_view) {
        // Согласие/расхождение подсвечиваем по тексту мысли модели.
        const dv = pairData.deepseek_view;
        const disagree = /расхожден|не согла/i.test(dv);
        const tag = disagree
            ? "<span style='color:#ffa726'>⚠ расхождение</span>"
            : "<span style='color:#26a69a'>✓ согласие</span>";
        html += "<div class='section'>" +
            "<div class='section-title'>🤖 Мысль DeepSeek " + tag + "</div>" +
            "<div>" + dv + "</div>" +
            "</div>";
    }

    html += "<div class='section'>" +
        "<div class='section-title'>Ключевые уровни</div>" +
        "<div><span style='color:#ef5350'>Resistance:</span> " +
        "<span class='level'>" + (resistances || "N/A") + "</span></div>" +
        "<div><span style='color:#26a69a'>Support:</span> " +
        "<span class='level'>" + (supports || "N/A") + "</span></div>" +
        "<div>Тренд: <b>" + ((pairData.trend || "unknown").toUpperCase()) + "</b></div>" +
        "</div>";

    html += "<div class='section'>" +
        "<div class='section-title'>Обоснование</div>" +
        "<div>" + (pairData.reasoning || "Нет обоснования.") + "</div>" +
        "</div>";

    // Накопленный контекст
    const accCtx = lastBriefingData.accumulated_context || {};
    const pairCtx = accCtx[currentSymbol];
    if (pairCtx && pairCtx.length > 0) {
        html += "<div class='section'>" +
            "<div class='section-title'>Накопленный контекст</div><ul style='color:#aaa;font-size:11px'>" +
            pairCtx.map(function(c) { return "<li>" + c + "</li>"; }).join("") +
            "</ul></div>";
    }

    html += "<div class='section'>" +
        "<div class='section-title'>На что обратить внимание</div>" +
        "<div>" + (pairData.watch_for || "Ничего конкретного.") + "</div>" +
        "</div>";

    if (pairData.key_events && pairData.key_events.length > 0) {
        html += "<div class='section'>" +
            "<div class='section-title'>Ожидаемые новости</div><ul>" +
            pairData.key_events.map(function(e) { return "<li>" + e + "</li>"; }).join("") +
            "</ul></div>";
    }

    if (globalCtx.risk_factors && globalCtx.risk_factors.length > 0) {
        html += "<div class='section'>" +
            "<div class='section-title'>Факторы риска</div><ul>" +
            globalCtx.risk_factors.map(function(r) {
                return "<li style='color:#ff8a80'>⚠️ " + r + "</li>";
            }).join("") +
            "</ul></div>";
    }

    if (globalCtx.recommendation) {
        html += "<div class='section'>" +
            "<div class='section-title'>Рекомендация</div>" +
            "<div>" + globalCtx.recommendation + "</div>" +
            "</div>";
    }

    // Трек-рекорд «кто чаще прав» — общий для всех пар, внизу брифинга.
    const tr = lastBriefingData.track_record;
    if (tr && (tr.deepseek?.total || tr.consensus?.total)) {
        const pct = function(x) {
            return x.total ? Math.round(100 * x.hit / x.total) + "%" : "—";
        };
        html += "<div class='section' style='border-top:1px solid var(--divider);padding-top:8px'>" +
            "<div class='section-title'>Трек-рекорд (7 дней)</div>" +
            "<div style='font-size:12px'>" +
            "Аналитики: <b>" + tr.consensus.hit + "/" + tr.consensus.total +
            "</b> (" + pct(tr.consensus) + ")<br>" +
            "🤖 DeepSeek: <b>" + tr.deepseek.hit + "/" + tr.deepseek.total +
            "</b> (" + pct(tr.deepseek) + ")";
        if (tr.disagreements) {
            html += "<br><span style='color:#aaa'>Расхождений: " + tr.disagreements +
                ", из них DeepSeek прав в " + tr.disagree_ds_right + "</span>";
        }
        html += "</div></div>";
    }

    content.innerHTML = html;
}

const IND_DEFAULTS = {
    sma:        { params: { period: 20 },                          color: '#2962FF' },
    ema:        { params: { period: 21 },                          color: '#ff9800' },
    bollinger:  { params: { period: 20, mult: 2 },                 color: '#9c27b0' },
    rsi:        { params: { period: 14 },                          color: '#e91e63' },
    macd:       { params: { fast: 12, slow: 26, signal: 9 },       color: '#2962FF' },
    stochastic: { params: { period: 14, smoothK: 3, smoothD: 3 },  color: '#2962FF' },
};
const IND_LABELS = { sma: 'SMA', ema: 'EMA', bollinger: 'Bollinger', rsi: 'RSI', macd: 'MACD', stochastic: 'Stoch' };

let _indSettingsTarget = null; // { paneId, instanceId }
let _indSettingsLineWidth = 2;

function saveIndicators(paneId) {
    const mgr = panesState[paneId]?.indicatorManager;
    if (!mgr) return;
    if (!layout.indicators) layout.indicators = {};
    layout.indicators[paneId] = mgr.serialize();
    StorageLayer.autoSave(layout);
}

function renderIndicatorList(paneId) {
    const mgr = panesState[paneId]?.indicatorManager;
    const list = document.getElementById('indList');
    if (!list) return;
    if (!mgr || !mgr.getInstances().length) {
        list.innerHTML = '<div style="color:#aaa;font-size:11px;padding:4px 0;">No indicators added</div>';
        return;
    }
    list.innerHTML = mgr.getInstances().map(inst => {
        const label = IND_LABELS[inst.type] || inst.type;
        const paramStr = _instParamStr(inst);
        return `<div class="ind-row">
            <span class="ind-swatch" style="background:${inst.color};"></span>
            <span class="ind-name">${label}${paramStr}</span>
            <button class="ind-settings-btn" onclick="openIndSettings('${inst.id}',${paneId},this,event)">⚙</button>
            <button class="ind-del-btn" onclick="removeIndicator('${inst.id}',${paneId})">✕</button>
        </div>`;
    }).join('');
}

function _instParamStr(inst) {
    const p = inst.params;
    if (inst.type === 'sma' || inst.type === 'ema') return `(${p.period})`;
    if (inst.type === 'bollinger') return `(${p.period},${p.mult})`;
    if (inst.type === 'rsi') return `(${p.period})`;
    if (inst.type === 'macd') return `(${p.fast},${p.slow},${p.signal})`;
    if (inst.type === 'stochastic') return `(${p.period},${p.smoothK},${p.smoothD})`;
    return '';
}

function toggleAddIndDropdown(e) {
    e.stopPropagation();
    const dd = document.getElementById('addIndDropdown');
    if (dd.style.display === 'block') { dd.style.display = 'none'; return; }
    dd.innerHTML = Object.keys(IND_DEFAULTS).map(type =>
        `<button onclick="addIndicator('${type}',${indicatorPanelPane})">${IND_LABELS[type]}</button>`
    ).join('');
    dd.style.display = 'block';
}

function addIndicator(type, paneId) {
    document.getElementById('addIndDropdown').style.display = 'none';
    const mgr  = panesState[paneId]?.indicatorManager;
    const data = panesState[paneId]?.data;
    if (!mgr) return;
    const def = IND_DEFAULTS[type];
    mgr.add(type, { ...def.params }, def.color, 2);
    if (data?.length) mgr.recomputeAll(data);
    renderIndicatorList(paneId);
    saveIndicators(paneId);
}

function removeIndicator(id, paneId) {
    const mgr  = panesState[paneId]?.indicatorManager;
    const data = panesState[paneId]?.data;
    if (!mgr) return;
    mgr.remove(id);
    if (data?.length) mgr.recomputeAll(data);
    renderIndicatorList(paneId);
    saveIndicators(paneId);
}

function openIndSettings(instanceId, paneId, btnEl, e) {
    if (e) e.stopPropagation();
    const mgr  = panesState[paneId]?.indicatorManager;
    if (!mgr) return;
    const inst = mgr.getInstances().find(i => i.id === instanceId);
    if (!inst) return;

    _indSettingsTarget     = { paneId, instanceId };
    _indSettingsLineWidth  = inst.lineWidth;

    const label = IND_LABELS[inst.type] || inst.type;
    document.getElementById('indSM_title').textContent = label + _instParamStr(inst);
    document.getElementById('indSM_color').value = inst.color;

    // MACD uses fixed line colors (blue MACD / orange signal), so its color
    // picker is meaningless — hide it.
    document.getElementById('indSM_colorRow').style.display = inst.type === 'macd' ? 'none' : 'flex';
    // For stochastic the top picker controls the %K line specifically (%D has
    // its own picker injected below); everything else just calls it "Color".
    document.getElementById('indSM_colorLabel').textContent = inst.type === 'stochastic' ? '%K color' : 'Color';

    // Highlight active width button
    document.querySelectorAll('#indSM_widthBtns button').forEach(btn => {
        btn.style.borderColor = parseInt(btn.dataset.w) === inst.lineWidth ? '#2962FF' : '#ddd';
        btn.style.color       = parseInt(btn.dataset.w) === inst.lineWidth ? '#2962FF' : '';

    // Inject type-specific param inputs

    let paramsHtml = '';

    } else if (inst.type === 'bollinger') {
        paramsHtml = `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
            <span>Period</span>
            <input type="number" id="indSM_p_period" value="${p.period}" min="2" max="500"
                   style="width:52px;padding:2px 4px;border:1px solid #ccc;border-radius:3px;">
            <span>×</span>
            <input type="number" id="indSM_p_mult" value="${p.mult}" min="0.1" max="10" step="0.1"
                   style="width:44px;padding:2px 4px;border:1px solid #ccc;border-radius:3px;">
        </div>`;
    } else if (inst.type === 'rsi') {
        paramsHtml = `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
            <span>Period</span>
            <input type="number" id="indSM_p_period" value="${p.period}" min="2" max="200"
                   style="width:52px;padding:2px 4px;border:1px solid #ccc;border-radius:3px;">

    } else if (inst.type === 'macd') {

            <span>F</span>
            <input type="number" id="indSM_p_fast" value="${p.fast}" min="2" max="200"
                   style="width:44px;padding:2px 4px;border:1px solid #ccc;border-radius:3px;">
            <span>S</span>
            <input type="number" id="indSM_p_slow" value="${p.slow}" min="2" max="200"
                   style="width:44px;padding:2px 4px;border:1px solid #ccc;border-radius:3px;">
            <span>Sig</span>
            <input type="number" id="indSM_p_signal" value="${p.signal}" min="2" max="200"
                   style="width:44px;padding:2px 4px;border:1px solid #ccc;border-radius:3px;">
        </div>`;
    } else if (inst.type === 'stochastic') {

            <span>K</span>

            <input type="number" id="indSM_p_smoothK" value="${p.smoothK}" min="1" max="20"
                   style="width:44px;padding:2px 4px;border:1px solid #ccc;border-radius:3px;">
            <span>D</span>
            <input type="number" id="indSM_p_smoothD" value="${p.smoothD}" min="1" max="20"
                   style="width:44px;padding:2px 4px;border:1px solid #ccc;border-radius:3px;">

    menu.style.display = 'block';
    const br = btnEl.getBoundingClientRect();
    menu.style.top  = br.bottom + 4 + 'px';
    menu.style.left = br.left + 'px';
    const mr = menu.getBoundingClientRect();
    if (mr.right > window.innerWidth)  menu.style.left = (window.innerWidth - mr.width - 8) + 'px';
    if (mr.bottom > window.innerHeight) menu.style.top = (br.top - mr.height - 4) + 'px';
}

function applyIndSettings() {
    if (!_indSettingsTarget) return;
    const { paneId, instanceId } = _indSettingsTarget;
    const mgr  = panesState[paneId]?.indicatorManager;
    const data = panesState[paneId]?.data;
    if (!mgr) return;
    const inst = mgr.getInstances().find(i => i.id === instanceId);
    if (!inst) return;

    // MACD has no color control — keep its existing color untouched.
    const color     = inst.type === 'macd' ? inst.color : document.getElementById('indSM_color').value;
    const lineWidth = _indSettingsLineWidth;

    // Read updated params from injected inputs
    let params = { ...inst.params };
    const gv = id => { const el = document.getElementById(id); return el ? el.value : null; };
    if (inst.type === 'sma' || inst.type === 'ema' || inst.type === 'rsi') {
        params = { ...params, period: parseInt(gv('indSM_p_period')) || inst.params.period };
    } else if (inst.type === 'bollinger') {
        params = { period: parseInt(gv('indSM_p_period')) || inst.params.period,
                   mult:   parseFloat(gv('indSM_p_mult'))  || inst.params.mult };
    } else if (inst.type === 'macd') {
        params = { fast:   parseInt(gv('indSM_p_fast'))   || inst.params.fast,
                   slow:   parseInt(gv('indSM_p_slow'))   || inst.params.slow,
                   signal: parseInt(gv('indSM_p_signal')) || inst.params.signal };
    } else if (inst.type === 'stochastic') {
        const ck = document.getElementById('indSM_p_showK');
        const cd = document.getElementById('indSM_p_showD');
        params = { period:  parseInt(gv('indSM_p_period'))  || inst.params.period,
                   smoothK: parseInt(gv('indSM_p_smoothK')) || inst.params.smoothK,
                   smoothD: parseInt(gv('indSM_p_smoothD')) || inst.params.smoothD,
                   showK:   ck ? ck.checked : (inst.params.showK !== false),
                   showD:   cd ? cd.checked : (inst.params.showD !== false),
                   dColor:  gv('indSM_p_dColor') || inst.params.dColor || '#ff9800' };
    }

    mgr.update(instanceId, params, color, lineWidth);
    if (data?.length) mgr.recomputeAll(data);
    renderIndicatorList(paneId);
    saveIndicators(paneId);
    closeIndSettings();
}

function closeIndSettings() {
    document.getElementById('indSettingsMenu').style.display = 'none';
    _indSettingsTarget = null;
}

function openIndicatorsPanel(paneId, e) {
    e.stopPropagation();
    indicatorPanelPane = paneId;

    const panel = document.getElementById("indicatorsPanel");
    renderIndicatorList(paneId);

    const btn  = document.getElementById(`indBtn${paneId}`);
    const rect = btn.getBoundingClientRect();

    panel.style.display = "block";
    panel.style.top  = (rect.bottom + 4) + "px";
    panel.style.left = rect.left + "px";

    // Clamp to viewport
    const pr = panel.getBoundingClientRect();
    if (pr.right > window.innerWidth) {
        panel.style.left = (window.innerWidth - pr.width - 8) + "px";
    }
}

function syncIndicatorPanelToState(paneId) {
    renderIndicatorList(paneId);
}

// ============================================================================
// Position tool dropdown (Long / Short под одной кнопкой)
// ============================================================================
function togglePositionDropdown(paneId, e) {
    e.stopPropagation();
    const dd  = document.getElementById("positionToolDropdown");
    const btn = document.getElementById(`posBtn${paneId}`);
    if (!dd || !btn) return;

    // повторный клик по той же кнопке — закрыть
    if (dd.style.display === "block" && dd.dataset.pane === String(paneId)) {
        dd.style.display = "none";
        return;
    }

    dd.dataset.pane = String(paneId);
    const rect = btn.getBoundingClientRect();
    dd.style.display = "block";
    dd.style.top  = (rect.bottom + 4) + "px";
    dd.style.left = rect.left + "px";

    const pr = dd.getBoundingClientRect();
    if (pr.right > window.innerWidth) {
        dd.style.left = (window.innerWidth - pr.width - 8) + "px";
    }
}

function pickPositionTool(side) {
    const dd = document.getElementById("positionToolDropdown");
    if (dd) dd.style.display = "none";
    setTool(side === "long" ? "posLong" : "posShort");
}

// Width button selection in settings menu
document.getElementById('indSM_widthBtns').addEventListener('click', e => {
    const btn = e.target.closest('button[data-w]');
    if (!btn) return;
    _indSettingsLineWidth = parseInt(btn.dataset.w);
    document.querySelectorAll('#indSM_widthBtns button').forEach(b => {
        b.style.borderColor = parseInt(b.dataset.w) === _indSettingsLineWidth ? '#2962FF' : '#ddd';
        b.style.color       = parseInt(b.dataset.w) === _indSettingsLineWidth ? '#2962FF' : '';
    });
});

// Close indicators panel and settings menu on outside click
document.addEventListener("click", e => {
    const panel = document.getElementById("indicatorsPanel");
    const btn1  = document.getElementById("indBtn1");
    const btn2  = document.getElementById("indBtn2");
    if (panel && !panel.contains(e.target) && e.target !== btn1 && e.target !== btn2) {
        panel.style.display = "none";
        document.getElementById('addIndDropdown').style.display = 'none';
    }
    const sm = document.getElementById('indSettingsMenu');
    if (sm && sm.style.display === 'block' && !sm.contains(e.target)) {
        closeIndSettings();
    }

    const posDd   = document.getElementById("positionToolDropdown");
    const posBtn1 = document.getElementById("posBtn1");
    const posBtn2 = document.getElementById("posBtn2");
    if (posDd && posDd.style.display === "block" &&
        !posDd.contains(e.target) && e.target !== posBtn1 && e.target !== posBtn2) {
        posDd.style.display = "none";
    }
});

// ============================================================================
// Global keyboard handlers
// ============================================================================
document.addEventListener("click", e => {
    const contextMenu = document.getElementById("contextMenu");
    const chartMenu   = document.getElementById("chartMenu");
    if (contextMenu && !contextMenu.contains(e.target) && chartMenu && !chartMenu.contains(e.target))
        contextMenu.style.display = "none";
    if (!document.getElementById("lineMenu").contains(e.target)) hideLineMenu();
});

document.addEventListener("keydown", e => {
    if (e.key === "Escape") {
        DrawingController.resetTool();
        [1, 2].forEach(id => {
            const st = panesState[id];
            if (st?.drawingEngine) st.drawingEngine.hideCursor();
        });
        ["lineOverlayBtn","hlineBtn1","rectOverlayBtn","lineOverlayBtn2","hlineBtn2","rectOverlayBtn2"].forEach(btnId => {
            const btn = document.getElementById(btnId);
            if (btn) { btn.style.background = ""; btn.style.color = ""; }
        });
        Object.values(panesState).forEach(st => {
            if (st.drawingEngine) { st.drawingEngine.drawings.forEach(d => d.selected = false); st.drawingEngine.render(); }
            if (st.selectedLine) st.selectedLine = null;
        });
    }

    if (e.key === "Delete") {
        Object.values(panesState).forEach(st => {
            if (st.drawingEngine) {
                const sel = st.drawingEngine.drawings.find(d => d.selected);
                if (sel) {
                    const paneId = sel.paneId;
                    st.drawingEngine.drawings = st.drawingEngine.drawings.filter(d => d !== sel);
                    st.drawingEngine.render();
                    StorageLayer.saveDrawings(paneId, layout, panesState, drawings);
                    return;
                }
            }
            if (st.selectedLine) {
                const paneId = st.selectedLine.paneId;
                st.series.removePriceLine(st.selectedLine.line);
                drawings[paneId] = drawings[paneId].filter(d => d !== st.selectedLine);
                StorageLayer.saveDrawings(paneId, layout, panesState, drawings);
                st.selectedLine = null;
            }
        });
    }

    if (e.key === "ArrowUp" || e.key === "ArrowDown") {
        const select = document.getElementById("symbolSelect");
        if (!select) return;
        let index = select.selectedIndex + (e.key === "ArrowDown" ? 1 : -1);
        if (index < 0) index = select.options.length - 1;
        if (index >= select.options.length) index = 0;
        const newSymbol = select.options[index].value;
        select.value = newSymbol;
        switchSymbol(newSymbol);
    }
});

function clearAllDrawings() {
    panes.forEach(paneId => {
        const st = panesState[paneId];
        if (!st) return;
        if (st.series) {
            drawings[paneId].forEach(obj => {
                if (obj.type === "alert" && obj.id)
                    panesState[paneId].ws.send(JSON.stringify({ type: "remove_alert", symbol: obj.symbol, id: obj.id }));
                if (obj.line) st.series.removePriceLine(obj.line);
            });
        }
        drawings[paneId] = [];
        if (layout.drawings[currentSymbol]) layout.drawings[currentSymbol][paneId] = [];
        if (st.drawingEngine) { st.drawingEngine.drawings = []; st.drawingEngine.render(); }
        if (st.selectedLine)  st.selectedLine = null;
    });
    StorageLayer.autoSave(layout);
}

function toggleChartSync() {
    syncEnabled = !syncEnabled;
    const btn = document.getElementById("chartSyncBtn");
    if (!btn) return;
    btn.classList.toggle("on", syncEnabled);
}

// ── Тема (светлая/тёмная) ──
// CSS-часть меняется через data-theme на <html>; график LWC красится отдельно
// через applyOptions (он не читает CSS-переменные). Выбор — в layout.theme.
function chartThemeOptions() {
    const css = getComputedStyle(document.documentElement);
    const bg   = css.getPropertyValue("--chart-bg").trim();
    const text = css.getPropertyValue("--chart-text").trim();
    const grid = css.getPropertyValue("--chart-grid").trim();
    const sep  = css.getPropertyValue("--chart-sep").trim();
    return {
        layout: { background: { color: bg }, textColor: text, panes: { separatorColor: sep } },
        grid:   { vertLines: { color: grid }, horzLines: { color: grid } },
    };
}
function applyChartTheme() {
    const opts = chartThemeOptions();
    Object.values(panesState).forEach(st => { if (st.chart) st.chart.applyOptions(opts); });
}
function applyTheme(theme) {
    const t = (theme === "dark") ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", t);
    // подсветка активной кнопки в переключателе
    document.querySelectorAll("#themeToggle button").forEach(b =>
        b.classList.toggle("on", b.dataset.themeBtn === t));
    applyChartTheme();
}

// Тумблер типа в #contextMenu действует на панель, по которой меню открыто
// (chartMenuPane выставляется showChartMenu). Без панели — тихо выходим.
function setChartTypeFromMenu(type) {
    if (typeof chartMenuPane !== "number" || !panesState[chartMenuPane]) return;
    setChartType(chartMenuPane, type);
}
function syncChartTypeButtons(paneId) {
    const cur = layout[`pane${paneId}`]?.chartType || "candles";
    document.querySelectorAll("#chartTypeToggle button").forEach(b =>
        b.classList.toggle("on", b.dataset.charttypeBtn === cur));
}
function setTheme(theme) {
    layout.theme = (theme === "dark") ? "dark" : "light";
    applyTheme(layout.theme);
    StorageLayer.autoSave(layout);
}

// ── Меню «⋯» (редкие действия: удалить всё, сбросить масштаб) ──
function closeMoreMenus() {
    document.querySelectorAll(".tb-more-menu.open").forEach(m => m.classList.remove("open"));
}
function toggleMoreMenu(paneId, e) {
    if (e) e.stopPropagation();
    const menu = document.getElementById("moreMenu" + paneId);
    const btn  = document.getElementById("moreBtn" + paneId);
    if (!menu || !btn) return;
    const wasOpen = menu.classList.contains("open");
    closeMoreMenus();
    if (wasOpen) return;
    // Позиционируем меню под кнопкой (fixed, чтобы не обрезалось тулбаром).
    const r = btn.getBoundingClientRect();
    menu.style.position = "fixed";
    menu.style.top   = (r.bottom + 6) + "px";
    menu.style.right = (window.innerWidth - r.right) + "px";
    menu.classList.add("open");
}
// Закрытие по клику вне меню.
document.addEventListener("click", e => {
    if (!e.target.closest(".tb-more-menu") && !e.target.closest('[id^="moreBtn"]'))
        closeMoreMenus();
});

// ============================================================================
// Mobile
// ============================================================================
let currentMobileTab = 1;
function isMobile() { return window.innerWidth <= 768; }

function switchMobileTab(tabNum) {
    if (!isMobile()) return;
    currentMobileTab = tabNum;
    const col1 = document.getElementById("column1"), col2 = document.getElementById("column2");
    const tab1 = document.getElementById("mobTab1"),  tab2 = document.getElementById("mobTab2");
    if (tabNum === 1) {
        col1.classList.add("mob-active"); col2.classList.remove("mob-active");
        tab1.classList.add("active");     tab2.classList.remove("active");
    } else {
        col2.classList.add("mob-active"); col1.classList.remove("mob-active");
        tab2.classList.add("active");     tab1.classList.remove("active");
    }
    requestAnimationFrame(() => {
        document.body.offsetHeight;
        [1, 2].forEach(k => {
            const div = document.getElementById(`chart${k}`);
            const st  = panesState[k];
            if (div && st?.chart) st.chart.resize(div.clientWidth, div.clientHeight);
        });
    });
}

function initMobileLayout() {
    if (!isMobile()) return;
    document.getElementById("column1").classList.add("mob-active");
    document.getElementById("column2").classList.remove("mob-active");
}

function toggleMobileLayout(e) {
    if (e) e.stopPropagation();
    // Save/Load разметки переехали в меню «⋯» тулбара — на мобиле открываем его.
    toggleMoreMenu(1, e);
}

window.addEventListener("resize", () => {
    if (isMobile()) switchMobileTab(currentMobileTab);
});

// ============================================================================
// Initialize
// ============================================================================
function initialize() {
    initCandleColorMenu();
    initLineContextMenu();

    panes.forEach(createPane);
    applyColors();

    // Тема — из сохранённого layout (по умолчанию светлая)
    applyTheme(layout.theme || "light");

    // Sync btn initial state
    const syncBtn = document.getElementById("chartSyncBtn");
    if (syncBtn && syncEnabled) syncBtn.classList.add("on");

    // Symbol selector
    const symbolSelect = document.getElementById("symbolSelect");
    if (symbolSelect) {
        symbolSelect.value = currentSymbol;
        symbolSelect.onchange = e => switchSymbol(e.target.value);
    }

    // Restore layout split.
    // ВАЖНО: прячем колонку тем же механизмом, что и toggleFull (инлайновый
    // style.display + flex видимой колонки), а НЕ классом .hidden. Класс —
    // это display:none !important, и toggleFull, снимающий скрытие через
    // style.display="" , не может его перебить: выход из фулскрина после
    // перезагрузки молча не срабатывал (баг «нельзя вернуться в сплит»).
    const _col1 = document.getElementById("column1");
    const _col2 = document.getElementById("column2");
    if (layout.split === "leftFull") {
        _col2.style.display = "none"; _col1.style.flex = "1 1 100%";
    } else if (layout.split === "rightFull") {
        _col1.style.display = "none"; _col2.style.flex = "1 1 100%";
    }

    // Button handlers ("Удалить всё" переехал в меню «⋯» с прямым onclick)
    document.getElementById("chartSyncBtn").onclick = toggleChartSync;

    document.getElementById("hlineBtn1").onclick = () => {
        setTool("hline");
        if (isMobile()) panes.forEach(id => { const st = panesState[id]; if (st?.drawingEngine) st.drawingEngine.showCursor(); });
    };
    document.getElementById("lineOverlayBtn").onclick = () => {
        setTool("lineOverlay");
        if (isMobile()) panes.forEach(id => { const st = panesState[id]; if (st?.drawingEngine) st.drawingEngine.showCursor(); });
    };
    document.getElementById("rectOverlayBtn").onclick = () => {
        setTool("rectOverlay");
        if (isMobile()) panes.forEach(id => { const st = panesState[id]; if (st?.drawingEngine) st.drawingEngine.showCursor(); });
    };

    // Pane-2 drawing buttons — same tools, mobile cursor support
    document.getElementById("hlineBtn2").onclick = () => {
        setTool("hline");
        if (isMobile()) panes.forEach(id => { const st = panesState[id]; if (st?.drawingEngine) st.drawingEngine.showCursor(); });
    };
    document.getElementById("lineOverlayBtn2").onclick = () => {
        setTool("lineOverlay");
        if (isMobile()) panes.forEach(id => { const st = panesState[id]; if (st?.drawingEngine) st.drawingEngine.showCursor(); });
    };
    document.getElementById("rectOverlayBtn2").onclick = () => {
        setTool("rectOverlay");
        if (isMobile()) panes.forEach(id => { const st = panesState[id]; if (st?.drawingEngine) st.drawingEngine.showCursor(); });
    };

    initMobileLayout();
}

initialize();
