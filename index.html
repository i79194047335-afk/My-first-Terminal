<script>
// ============================================================================
// Patch setTool / updateToolButtonState to keep pane-2 buttons in sync.
// Must use window assignment (not function declaration) to avoid hoisting
// stomping the ui-tools.js version before we capture it.
// ============================================================================
(function() {
    // Подсветка панели 2 — через классы (.on / .on-long / .on-short), как в
    // ui-tools.js для панели 1: кнопки стали иконочными, inline-заливка их ломает.
    const _orig = window.setTool;
    window.setTool = function setTool(tool) {
        _orig(tool);
        const ids2 = { lineOverlay: "lineOverlayBtn2", rectOverlay: "rectOverlayBtn2", hline: "hlineBtn2", posLong: "posBtn2", posShort: "posBtn2" };
        const cls2 = { posLong: "on-long", posShort: "on-short" };
        ["lineOverlayBtn2", "hlineBtn2", "rectOverlayBtn2", "posBtn2"].forEach(id => {
            const b = document.getElementById(id);
            if (b) b.classList.remove("on", "on-long", "on-short");
        });
        if (ids2[tool]) {
            const b = document.getElementById(ids2[tool]);
            if (b) b.classList.add(cls2[tool] || "on");
        }
    };

    const _origBtn = window.updateToolButtonState;
    window.updateToolButtonState = function updateToolButtonState(isActive) {
        _origBtn(isActive);
        const b2 = document.getElementById("hlineBtn2");
        if (b2) b2.classList.toggle("on", !!isActive);
    };
})();

// ============================================================================
// Constants
// ============================================================================
const TF_MAP = {
    S5:5, S10:10, S15:15, S30:30, M1:60, M3:180, M5:300, M15:900, H1:3600, H4:14400, D1:86400
};
// Адрес хаба; ?ws=ws://127.0.0.1:8767 — для локальной отладки против тест-хаба.
const WS_URL = new URLSearchParams(location.search).get("ws") || "ws://89.107.10.204:8765";
// Рэндж-бары: пресеты в ПОИНТАХ (как TradingView), произвольное — через "R…".
// Поинт = минимальный тик (5-й знак EUR/USD), поэтому пресеты крупнее пипсовых:
// R10 = 10 поинтов = 1 пипс, R50 = 5 пипсов.
const RANGE_PRESETS = [10, 20, 50];

// "R:10" → 10.0; null, если это не рэндж-ТФ (зеркало hub.parse_range_tf).
function parseRangeTF(tf) {
    if (typeof tf !== "string" || !tf.startsWith("R:")) return null;
    const points = parseFloat(tf.slice(2));
    return (points > 0 && points <= 10000) ? points : null;
}

// Размер ОДНОГО ПОИНТА (пипетты) — последний знак котировки: 10^-precision.
// EUR/USD → 0.00001, USD/JPY → 0.001. Единица рэндж-баров, как у всех. Дефолт — мажоры.
function pointSizeOf(symbol) {
    const p = instrumentPrecision[symbol]?.precision ?? 5;
    return Math.pow(10, -p);
}

// Кастомный рэндж ("R:7") должен существовать в селекторе, иначе value не встанет.
function ensureTfOption(select, tf) {
    if (!parseRangeTF(tf)) return;
    if ([...select.options].some(o => o.value === tf)) return;
    const opt = document.createElement("option");
    opt.value = tf; opt.text = tf.replace(":", "");
    const custom = [...select.options].find(o => o.value === "R:custom");
    select.insertBefore(opt, custom || null);
}
const DEFAULT_BAR_COUNT = 122;
const TZ_OFFSET = 5;
const DEFAULT_COLORS = {
    up: "#26a69a", down: "#ef5350", wickUp: "#26a69a", wickDown: "#ef5350"
};
// Тип отрисовки главной серии. "candles" — свечи, "bars" — OHLC-бары.
const CHART_TYPES = ["candles", "bars"];

// ============================================================================
// Global state
// ============================================================================
const layout = StorageLayer.loadLayout(DEFAULT_COLORS);
const panes  = [1, 2];

if (!layout.symbol)     layout.symbol = "AUD/USD";
if (!layout.indicators) layout.indicators = {};

let currentSymbol = layout.symbol;

// symbol → {precision, minMove}. Заполняется из WS-сообщения instruments (его
// шлёт хаб по данным брокера). Раньше precision был захардкожен 5 для всех, а у
// USD/JPY на самом деле 3 знака — цена рисовалась с двумя лишними нулями.
let instrumentPrecision = {};
function applyPriceFormat(id) {
    const st = panesState[id];
    if (!st || !st.series) return;
    const p = instrumentPrecision[currentSymbol];
    const precision = p ? p.precision : 5;
    const minMove   = p ? p.minMove   : 0.00001;
    st.series.applyOptions({ priceFormat: { type: 'price', precision, minMove } });
}

// Перестраивает <option> селектора пар из списка, пришедшего в instruments.
// HTML-разметка селектора остаётся как fallback до первого instruments (чтобы
// он не был пустым при загрузке). Порядок опций сохраняем как пришёл от хаба.
function populateSymbolSelect(symbols) {
    const select = document.getElementById("symbolSelect");
    if (!select || !symbols || !symbols.length) return;

    // Ничего не делаем, если набор совпадает — чтобы не сбрасывать выбор.
    const existing = Array.from(select.options).map(o => o.value);
    const same = existing.length === symbols.length &&
                 existing.every((v, i) => v === symbols[i]);
    if (same) return;

    const prev = select.value;
    select.innerHTML = "";
    for (const sym of symbols) {
        const opt = document.createElement("option");
        opt.value = sym; opt.text = sym;
        select.appendChild(opt);
    }
    // Сохраняем текущий выбор, если он ещё есть в новом списке.
    select.value = symbols.includes(prev) ? prev
                 : (symbols.includes(currentSymbol) ? currentSymbol : symbols[0]);
}

// ── Briefing panel state ──
let briefVisible = false;
let lastBriefingData = null;

const panesState  = {};
const drawings    = { 1: [], 2: [] };
const pendingAlerts = {};

let ws1 = null, ws2 = null;

// ── Heartbeat / индикатор связи ─────────────────────────────────────────
// Хаб шлёт {type:"heartbeat", data:health()} раз в ~10 с. Если heartbeat не
// приходит дольше HEARTBEAT_TIMEOUT — считаем связь потерянной (точка мигает
// красным). health.status "stale" (рынок открыт, а тиков нет) — жёлтый.
let _lastHeartbeat = 0;
let _lastHealth    = null;
const HEARTBEAT_TIMEOUT = 25000;   // >2 периодов хаба (10 с) с запасом
const MARKET_SILENCE    = 20;      // сек тишины по инструменту → «рынок закрыт»

function onHeartbeat(health) {
    _lastHeartbeat = Date.now();
    _lastHealth    = health;
    updateConnDot();
}

// Смена инструмента только перерисовывает индикатор — свежесть считает хаб
// (symbols_age по РЕАЛЬНЫМ тикам), фронт лишь читает по currentSymbol.
function resetMarketDot() { updateConnDot(); }

// Индикатор состояния ВЫБРАННОГО инструмента (как «часы рынка» у TradingView),
// с приоритетом связи: нет связи — важнее любого статуса рынка. Свежесть берём
// из heartbeat (symbols_age), а НЕ из фронтового счётчика: одноразовый
// init-update при подписке — не реальный тик, и хаб его не учитывает.
function updateConnDot() {
    const dot = document.getElementById("connDot");
    if (!dot) return;
    const noLink = _lastHeartbeat === 0 || Date.now() - _lastHeartbeat > HEARTBEAT_TIMEOUT;
    const age    = _lastHealth?.symbols_age?.[currentSymbol];  // сек, или undefined

    let cls, tip;
    if (noLink) {
        cls = "conn-down";  tip = "Связь с сервером потеряна";
    } else if (age != null && age < MARKET_SILENCE) {
        cls = "conn-live";  tip = currentSymbol + " — рынок открыт (идут котировки)";
    } else {
        cls = "conn-idle";  tip = currentSymbol + " — рынок закрыт (нет котировок)";
    }
    dot.className = "conn-dot " + cls;
    dot.setAttribute("data-tip", tip);
}

// Тик-таймер: даже без новых heartbeat пересчитываем индикатор, чтобы «связь
// потеряна» зажглась по таймауту, а не только на следующем сообщении.
setInterval(updateConnDot, 3000);

// Привязать обработчики к сокету панели + автопереподключение при разрыве.
// Раньше onclose/onerror не было вовсе — при обрыве вкладка молча висела на
// мёртвом сокете до ручного F5. Теперь пересоздаём сокет с нарастающей паузой.
function wireSocket(id, state, els) {
    const ws = state.ws;
    ws.onopen = () => {
        state._reconnectDelay = 1000;   // успешный коннект — сброс backoff
        const tf = els ? els.tfSelect.value : (layout[`pane${id}`]?.tf || "M1");
        setTF(id, tf);
        ws.send(JSON.stringify({ type: "get_instruments" }));
        if (id === 1) ws.send(JSON.stringify({ type: "get_signals" }));
    };
    ws.onmessage = e => handleMessage(id, state, JSON.parse(e.data));
    ws.onclose   = () => scheduleReconnect(id, state);
    ws.onerror   = () => { try { ws.close(); } catch (e) {} };  // → onclose
}

function scheduleReconnect(id, state) {
    updateConnDot();   // сокет мёртв — индикатор сразу перечитает таймаут
    const delay = state._reconnectDelay || 1000;
    state._reconnectDelay = Math.min(delay * 2, 15000);  // 1→2→4→…→15 с
    setTimeout(() => {
        // Символ мог смениться, пока были в оффлайне — onopen возьмёт из layout.
        state.ws = new WebSocket(WS_URL);
        if (id === 1) ws1 = state.ws;
        if (id === 2) ws2 = state.ws;
        wireSocket(id, state, getPaneElements(id));
    }, delay);
}

let isDragging         = false;
let contextLinePane    = null;
let contextLineObject  = null;
let syncEnabled        = true;
let _crosshairSyncing  = false;   // защита от рекурсии при синхронизации курсоров

// Indicators panel state
let indicatorPanelPane = null; // which pane the panel is showing for

// ============================================================================
// Utilities
// ============================================================================
function getPaneElements(id) {
    return {
        wrapper:  document.getElementById(`wrapper${id}`),
        chartDiv: document.getElementById(`chart${id}`),
        tfSelect: document.getElementById(`tf${id}`),
        countdown: document.getElementById(`countdown${id}`)
    };
}
function updateCursor(el, type) { el.style.cursor = type; }

function deselectLine() {
    Object.values(panesState).forEach(st => {
        if (st.selectedLine) {
            st.selectedLine.line.applyOptions({ color: st.selectedLine.color, lineWidth: st.selectedLine.width });
            st.selectedLine = null;
        }
    });
}
function selectLine(obj) {
    deselectLine();
    const st = panesState[obj.paneId];
    st.selectedLine = obj;
    obj.line.applyOptions({ color: "#2962FF" });
}

function addHorizontalLine(id, price) {
    const { series } = panesState[id];
    const line = series.createPriceLine({
        price, color: "#000000", lineWidth: 2,
        lineStyle: LightweightCharts.LineStyle.Solid, axisLabelVisible: true
    });
    const obj = { paneId: id, type: "hline", price, line, color: "#000000", width: 2 };
    drawings[id].push(obj);
    StorageLayer.saveDrawings(id, layout, panesState, drawings);
    return obj;
}

function addAlertLine(id, price) {
    const { series } = panesState[id];
    const line = series.createPriceLine({
        price, color: "#000000", lineWidth: 1,
        lineStyle: LightweightCharts.LineStyle.Dashed, axisLabelVisible: true, title: "🔔"
    });
    const obj = { id: null, paneId: id, type: "alert", price, symbol: currentSymbol, triggered: false, line };
    pendingAlerts[price] = obj;
    drawings[id].push(obj);
    panesState[id].ws.send(JSON.stringify({ type: "add_alert", symbol: currentSymbol, price }));
    StorageLayer.saveDrawings(id, layout, panesState, drawings);
}

function getEventCoords(e) {
    if (e.touches && e.touches.length > 0)
        return { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY };
    if (e.changedTouches && e.changedTouches.length > 0)
        return { clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY };
    return { clientX: e.clientX, clientY: e.clientY };
}
function isDrawingActive() {
    return DrawingController.getTool() !== "idle" || DrawingController.isDragging();
}

// ============================================================================
// SINGLE WebSocket message handler (used by both createPane and switchSymbol)
// ============================================================================
function handleMessage(id, state, msg) {
    const els = getPaneElements(id);

    if (msg.type === "heartbeat") { onHeartbeat(msg.data); return; }

    if (
        msg.type !== "alert" &&
        msg.type !== "alert_created" &&
        msg.type !== "analysis" &&
        msg.type !== "signal" &&
        msg.type !== "briefing" &&
        msg.type !== "signals_history" &&
        msg.requestId !== state.requestId
    ) return;

    if (msg.type === "history") {
        if (!state.chart) createChartInternal(id, state.tfSeconds);

        if (msg.data?.length) {
            // Сброс перекрестия перед самой подменой данных — на случай, если
            // курсор успел «залочить» точку, пока грузилась история (см. setTF).
            try { state.chart.clearCrosshairPosition(); } catch (e) {}
            state.data = msg.data;
            state.series.setData(state.data);
            refreshSignalMarkers();
            state.lastCandle = msg.data.at(-1);

            // Load or recompute indicators after first history
            if (!state.indicatorsLoaded) {
                state.indicatorsLoaded = true;
                // Clear any existing instances first — switchSymbol resets
                // indicatorsLoaded to force a reload, and without this the old
                // instances survive and loadFrom re-adds copies with colliding
                // ids (so a gear button would open the wrong instance's settings).
                state.indicatorManager.destroyAll();
                state.indicatorManager.loadFrom(
                    layout.indicators[id] || [],
                    state.data
                );
                syncIndicatorPanelToState(id);
            } else {
                state.indicatorManager.recomputeAll(state.data);
            }
        }

        StorageLayer.restoreDrawings(id, layout, panesState, drawings);

        setTimeout(() => {
            state.chart.resize(els.chartDiv.clientWidth, els.chartDiv.clientHeight);
            applyBarCount(id);
            state.chart.timeScale().scrollToRealTime();
            // resize() can redistribute pane heights — restore the user's sizes.
            state.indicatorManager?.applyStretch();
        }, 120);

        state.drawingEngine?.render();
    }

    if (msg.type === "update" && msg.candle) {
        state.series.update(msg.candle);

        const last = state.data[state.data.length - 1];
        let isNewBar = false;
        if (last && last.time === msg.candle.time) {
            state.data[state.data.length - 1] = msg.candle;
        } else {
            state.data.push(msg.candle);
            if (state.data.length > 30000) state.data.shift();
            isNewBar = true;
        }

        state.lastCandle = msg.candle;
        // TradingView-style incremental update: recompute indicators only over a
        // short trailing window and push the last point via series.update(), so
        // cost is O(constant) per tick instead of O(history). A full recompute is
        // unnecessary here because every indicator is causal (past values never
        // change); history load / param change still call recomputeAll().
        state.indicatorManager?.updateLast(state.data);
        // Signal markers are keyed to fixed signal timestamps and only change when
        // a new signal arrives (addSignalToLog → refreshSignalMarkers). Refreshing
        // on every tick re-scans the whole growing _signalLog for nothing; do it
        // at most once per bar (on bar close) to catch markers scrolling in/out.
        if (_signalsVisible && isNewBar) refreshSignalMarkers();
    }

    if (msg.type === "analysis") updateMarketEngine(msg);
    if (msg.type === "signal")   showSignal(msg);
    if (msg.type === "briefing") { lastBriefingData = msg.data; if (briefVisible) renderBriefing(); }
    if (msg.type === "signals_history") applySignalsHistory(msg.data);

    if (msg.type === "instruments") {
        // data: { provider: [ {symbol, price_decimals, ...}, ... ] }
        const symbols = [];
        for (const provider in msg.data) {
            for (const inst of msg.data[provider]) {
                const d = (inst.price_decimals == null) ? 5 : inst.price_decimals;
                instrumentPrecision[inst.symbol] = { precision: d, minMove: Math.pow(10, -d) };
                symbols.push(inst.symbol);
            }
        }
        Object.keys(panesState).forEach(id => applyPriceFormat(id));
        // Селектор пар — из instruments, а не из захардкоженной HTML-разметки.
        populateSymbolSelect(symbols);
    }

    if (msg.type === "alert" && msg.symbol === currentSymbol) {
        playAlertSound();
        showAlertPopup(msg.symbol + " @ " + msg.price);
        panes.forEach(paneId => {
            drawings[paneId].forEach(obj => {
                if (obj.type === "alert" && obj.id === msg.id) {
                    obj.triggered = true;
                    obj.line.applyOptions({ color: "#ff0000", lineWidth: 2, title: "🔕" });
                    StorageLayer.saveDrawings(paneId, layout, panesState, drawings);
                }
            });
        });
    }

    if (msg.type === "alert_created") {
        let obj = pendingAlerts[msg.price];
        let key = msg.price;
        if (!obj) {
            for (const k of Object.keys(pendingAlerts)) {
                if (Math.abs(parseFloat(k) - msg.price) < 0.00001) {
                    obj = pendingAlerts[k]; key = k; break;
                }
            }
        }
        if (obj) {
            obj.id = msg.id;
            StorageLayer.saveDrawings(obj.paneId, layout, panesState, drawings);
            delete pendingAlerts[key];
        }
    }
}

// ============================================================================
// createPane
// ============================================================================
function createPane(id) {
    const els = getPaneElements(id);

    els.tfSelect.addEventListener("keydown", e => {
        if (e.key === "ArrowUp" || e.key === "ArrowDown") e.preventDefault();
    });

    const state = panesState[id] = {
        chart: null, series: null, lastCandle: null, requestId: 0,
        ws: new WebSocket(WS_URL),
        tfSeconds: TF_MAP[layout[`pane${id}`]?.tf || "M1"] ?? null,
        rangePips: parseRangeTF(layout[`pane${id}`]?.tf || "M1"),
        selectedLine: null, data: [], syncBound: false,
        indicatorManager: null, indicatorsLoaded: false
    };

    if (id === 1) ws1 = state.ws;
    if (id === 2) ws2 = state.ws;

    Object.keys(TF_MAP).forEach(tf => {
        const opt = document.createElement("option");
        opt.value = tf; opt.text = tf;
        els.tfSelect.appendChild(opt);
    });
    RANGE_PRESETS.forEach(p => {
        const opt = document.createElement("option");
        opt.value = "R:" + p; opt.text = "R" + p;
        els.tfSelect.appendChild(opt);
    });
    const customOpt = document.createElement("option");
    customOpt.value = "R:custom"; customOpt.text = "R…";
    els.tfSelect.appendChild(customOpt);

    // Сохранённый кастомный рэндж (например "R:7") добавляем как опцию.
    ensureTfOption(els.tfSelect, layout[`pane${id}`]?.tf);
    els.tfSelect.value = layout[`pane${id}`]?.tf || "M1";

    wireSocket(id, state, els);

    els.tfSelect.onchange = () => {
        let v = els.tfSelect.value;
        if (v === "R:custom") {
            const prev  = layout[`pane${id}`]?.tf || "M1";
            const inp   = prompt("Диапазон рэндж-бара, в пипсах:",
                                 parseRangeTF(prev) || 10);
            const pips  = inp === null ? null
                        : parseFloat(String(inp).replace(",", "."));
            if (!pips || pips <= 0 || pips > 10000) {
                els.tfSelect.value = prev;   // отмена/мусор — откат селектора
                return;
            }
            v = "R:" + pips;
            ensureTfOption(els.tfSelect, v);
            els.tfSelect.value = v;
        }
        setTF(id, v);
    };
    setInterval(() => updateCountdown(id), 250);
    // Pick up user-dragged oscillator pane heights (LWC has no pane-resize event).
    setInterval(() => panesState[id]?.indicatorManager?.captureStretch(), 1500);

    // ────────────────────────────────────────────────────────────
    function createChartInternal(paneId, tfSec) {
        const { chartDiv } = getPaneElements(paneId);
        const st = panesState[paneId];

        st.chart = LightweightCharts.createChart(chartDiv, {
            width: chartDiv.clientWidth,
            height: chartDiv.clientHeight,
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            layout: {
                panes: { separatorColor: '#cccccc' }
            },
            localization: {
                timeFormatter: (time) => {
                    const ts = (typeof time === "object" ? time.timestamp : time) * 1000;
                    const d  = new Date(ts + TZ_OFFSET * 3600 * 1000);
                    const Y  = d.getUTCFullYear();
                    const M  = String(d.getUTCMonth()+1).padStart(2,"0");
                    const D  = String(d.getUTCDate()).padStart(2,"0");
                    const h  = String(d.getUTCHours()).padStart(2,"0");
                    const m  = String(d.getUTCMinutes()).padStart(2,"0");
                    const s  = String(d.getUTCSeconds()).padStart(2,"0");
                    return `${D}.${M}.${Y} ${h}:${m}:${s}`;
                }
            },
            timeScale: {
                timeVisible: true,
                secondsVisible: !tfSec || tfSec < 60,
                rightBarStaysOnScroll: true,
                rightOffset: 12,
                tickMarkFormatter: (time) => {
                    const ts = (typeof time === "object" ? time.timestamp : time) * 1000;
                    const d  = new Date(ts + TZ_OFFSET * 3600 * 1000);
                    const h  = String(d.getUTCHours()).padStart(2,"0");
                    const m  = String(d.getUTCMinutes()).padStart(2,"0");
                    const s  = String(d.getUTCSeconds()).padStart(2,"0");
                    return `${h}:${m}:${s}`;
                }
            }
        });

        st.series = makeSeries(st.chart, layout[`pane${paneId}`]?.chartType);
        // Точный precision для текущего символа, если instruments уже пришли
        // (иначе останется дефолт 5 до первого сообщения instruments).
        applyPriceFormat(paneId);

        // Тема графика (фон/текст/сетка) — сразу при создании, иначе новый
        // график рисуется на дефолтном белом фоне LWC до следующей смены темы.
        if (typeof chartThemeOptions === "function") st.chart.applyOptions(chartThemeOptions());

        // Indicator manager — created here, loaded later in handleMessage.
        // stretch hooks persist user-set oscillator pane heights in layout.
        st.indicatorManager = new IndicatorManager(paneId, st.chart, st.series, chartDiv, {
            load: () => layout.paneStretch?.[paneId] || null,
            save: (map) => {
                layout.paneStretch = layout.paneStretch || {};
                layout.paneStretch[paneId] = map;
                StorageLayer.autoSave(layout);
            }
        });

        // Drawing overlay
        st.drawingEngine = new DrawingEngine(paneId, st.chart, st.series, chartDiv);

        // Синхронное отображение курсоров на обеих панелях.
        // Движение мыши по одному графику отражается крестиком на другом
        // (по цене и времени курсора). _crosshairSyncing гасит обратный вызов,
        // т.к. setCrosshairPosition сам триггерит subscribeCrosshairMove.
        st.chart.subscribeCrosshairMove(param => {
            if (_crosshairSyncing || !syncEnabled) return;
            const otherId = paneId === 1 ? 2 : 1;
            const other   = panesState[otherId];
            if (!other || !other.chart || !other.series) return;

            _crosshairSyncing = true;
            try {
                if (!param.point || typeof param.time !== "number") {
                    other.chart.clearCrosshairPosition();
                } else {
                    const price = st.series.coordinateToPrice(param.point.y);
                    if (price !== null) {
                        other.chart.setCrosshairPosition(price, param.time, other.series);
                    } else {
                        other.chart.clearCrosshairPosition();
                    }
                }
            } catch (e) {}
            _crosshairSyncing = false;
        });

        applyColors();
        setupInteractionHandlers(paneId, st, els);
    }

    // Expose createChartInternal so handleMessage can call it on first history
    // (closure over id/state/els is correct here)
    window[`_createChart${id}`] = createChartInternal;

    function updateCountdown(paneId) {
        const st = panesState[paneId];
        if (!st.lastCandle || !st.series) return;
        let txt;
        if (st.rangePips) {
            // У рэндж-бара нет времени закрытия — показываем набранный
            // диапазон в ПОИНТАХ: «6/10» (rangePips хранит поинты, как задан R).
            const got = (st.lastCandle.high - st.lastCandle.low)
                        / pointSizeOf(currentSymbol);
            txt = got.toFixed(0) + "/" + st.rangePips;
        } else {
            const now    = Math.floor(Date.now() / 1000);
            const bucket = Math.floor(now / st.tfSeconds) * st.tfSeconds;
            let remain   = st.tfSeconds - (now - bucket);
            if (remain < 0) remain = 0;
            // ММ:СС до часа, ЧЧ:ММ:СС дальше — иначе H4/D1 показывали "238:47"
            const h  = Math.floor(remain / 3600);
            const m  = Math.floor((remain % 3600) / 60).toString().padStart(2,'0');
            const s  = (remain % 60).toString().padStart(2,'0');
            txt = h > 0 ? `${h.toString().padStart(2,'0')}:${m}:${s}` : `${m}:${s}`;
        }
        const y  = st.series.priceToCoordinate(st.lastCandle.close);
        if (y === null) return;
        const el = getPaneElements(paneId).countdown;
        el.style.top  = (y + 9) + "px";
        el.style.background = st.lastCandle.close >= st.lastCandle.open ? "#089981" : "#f23645";
        el.innerText  = txt;
    }
}

// ============================================================================
// createChartInternal — called from handleMessage on first history
// ============================================================================
function createChartInternal(id, tfSec) {
    window[`_createChart${id}`]?.(id, tfSec);
}

// ============================================================================
// Interaction handlers (drawing, drag, context menus, touch)
// ============================================================================
function setupInteractionHandlers(paneId, st, els) {
    const id = paneId;

    let touchPrevX = null, touchPrevY = null;
    let touchStartX = null, touchStartY = null;
    let mobileEditMode = null, mobileEditPrevX = null, mobileEditPrevY = null;
    let mobileEditStartX = null, mobileEditStartY = null;

    els.wrapper.addEventListener("touchstart", e => {
        const tool = DrawingController.getTool();
        const isDrawing = (tool === "lineOverlay" || tool === "rectOverlay" || tool === "hline");

        if (isDrawing) {
            st.chart.applyOptions({ handleScroll: false, handleScale: false });
            e.preventDefault();
            touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
            touchPrevX  = e.touches[0].clientX; touchPrevY  = e.touches[0].clientY;
            if (!st.drawingEngine.cursorActive) st.drawingEngine.showCursor();
            return;
        }

        if (tool === "idle") {
            const touch = e.touches[0];
            const rect  = els.wrapper.getBoundingClientRect();
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            mobileEditStartX = touch.clientX; mobileEditStartY = touch.clientY;
            mobileEditPrevX  = touch.clientX; mobileEditPrevY  = touch.clientY;

            const pointHit = st.drawingEngine.hitTestPoint(x, y);
            if (pointHit) {
                mobileEditMode = "point";
                DrawingController.startDrag(pointHit.obj, null, null, pointHit.pointIndex);
                st.chart.applyOptions({ handleScroll: false, handleScale: false });
                e.preventDefault(); return;
            }
            const lineHit = st.drawingEngine.hitTestLine(x, y);
            if (lineHit) {
                mobileEditMode = "line";
                DrawingController.startDrag(lineHit, 0, 0, null);
                DrawingController.originalPoints = lineHit.points.map(p => ({ ...p }));
                st.chart.applyOptions({ handleScroll: false, handleScale: false });
                e.preventDefault(); return;
            }
            const stLocal = panesState[id];
            if (stLocal.selectedLine) {
                const lineY = st.series.priceToCoordinate(stLocal.selectedLine.price);
                if (lineY !== null && Math.abs(lineY - y) < 16) {
                    mobileEditMode = "hline"; isDragging = true;
                    st.chart.applyOptions({ handleScroll: false, handleScale: false });
                    e.preventDefault(); return;
                }
            }
        }
    }, { passive: false });

    els.wrapper.addEventListener("touchmove", e => {
        e.preventDefault();
        const tool = DrawingController.getTool();
        const isDrawing = (tool === "lineOverlay" || tool === "rectOverlay");
        const touch = e.touches[0];
        const rect  = els.wrapper.getBoundingClientRect();
        const tx = touch.clientX - rect.left;
        const ty = touch.clientY - rect.top;

        if (isDrawing) {
            if (touchPrevX !== null) {
                const dx = touch.clientX - touchPrevX, dy = touch.clientY - touchPrevY;
                st.drawingEngine.moveCursor(dx, dy);
                const newX = st.drawingEngine.cursorX, newY = st.drawingEngine.cursorY;
                const preview = DrawingController.getPreviewLine();
                if (preview && DrawingController.getTempStart()) {
                    const rawTime = st.chart.timeScale().coordinateToTime(newX);
                    const price   = st.series.coordinateToPrice(newY);
                    if (rawTime && price !== null) {
                        const time = typeof rawTime === "object" ? rawTime.timestamp : rawTime;
                        if (typeof time === "number") { preview.points[1] = { time, price }; st.drawingEngine.render(); }
                    }
                }
            }
            touchPrevX = touch.clientX; touchPrevY = touch.clientY; return;
        }

        if (mobileEditMode && mobileEditPrevX !== null) {
            const dx = touch.clientX - mobileEditPrevX, dy = touch.clientY - mobileEditPrevY;
            mobileEditPrevX = touch.clientX; mobileEditPrevY = touch.clientY;

            if (mobileEditMode === "point") {
                const draggedLine = DrawingController.getDraggedLine();
                const pointIndex  = DrawingController.getDraggedPointIndex();
                if (!draggedLine || pointIndex === null) return;
                const p = draggedLine.points[pointIndex];
                const px = st.drawingEngine.timeMapper.getX(p.time);
                const py = st.series.priceToCoordinate(p.price);
                if (px === null || py === null) return;
                const newX    = Math.max(0, Math.min(rect.width,  px + dx));
                const newY    = Math.max(0, Math.min(rect.height, py + dy));
                const rawTime = st.chart.timeScale().coordinateToTime(newX);
                const price   = st.series.coordinateToPrice(newY);
                if (!rawTime || price === null) return;
                const time = typeof rawTime === "object" ? rawTime.timestamp : rawTime;
                if (typeof time !== "number") return;
                draggedLine.points[pointIndex] = { time, price };
                st.drawingEngine.render(); return;
            }
            if (mobileEditMode === "line") {
                const draggedLine = DrawingController.getDraggedLine();
                if (!draggedLine) return;
                const cx = rect.width / 2, cy2 = rect.height / 2;
                const rawT1 = st.chart.timeScale().coordinateToTime(cx);
                const rawT2 = st.chart.timeScale().coordinateToTime(cx + dx);
                const p1v   = st.series.coordinateToPrice(cy2);
                const p2v   = st.series.coordinateToPrice(cy2 + dy);
                if (!rawT1 || !rawT2 || p1v === null || p2v === null) return;
                const t1 = typeof rawT1 === "object" ? rawT1.timestamp : rawT1;
                const t2 = typeof rawT2 === "object" ? rawT2.timestamp : rawT2;
                draggedLine.points = DrawingController.originalPoints.map(p => ({
                    time: p.time + (t2 - t1), price: p.price + (p2v - p1v)
                }));
                st.drawingEngine.render(); return;
            }
            if (mobileEditMode === "hline") {
                const stLocal = panesState[id];
                if (!stLocal.selectedLine) return;
                const lineY = st.series.priceToCoordinate(stLocal.selectedLine.price);
                if (lineY === null) return;
                const newPrice = st.series.coordinateToPrice(lineY + dy);
                if (newPrice === null) return;
                stLocal.selectedLine.price = newPrice;
                stLocal.selectedLine.line.applyOptions({ price: newPrice });
                if (stLocal.selectedLine.type === "alert") {
                    panesState[id].ws.send(JSON.stringify({ type: "update_alert", symbol: currentSymbol, id: stLocal.selectedLine.id, price: newPrice }));
                }
                return;
            }
        }
    }, { passive: false });

    els.wrapper.addEventListener("touchend", e => {
        const tool = DrawingController.getTool();
        const isDrawing = (tool === "lineOverlay" || tool === "rectOverlay" || tool === "hline");

        if (isDrawing) {
            const isTap = touchStartX !== null && e.changedTouches.length > 0 &&
                Math.abs(e.changedTouches[0].clientX - touchStartX) < 8 &&
                Math.abs(e.changedTouches[0].clientY - touchStartY) < 8;
            touchStartX = null; touchStartY = null; touchPrevX = null; touchPrevY = null;
            if (!isTap) return;

            if (tool === "lineOverlay" || tool === "rectOverlay") {
                const cx = st.drawingEngine.cursorX, cy = st.drawingEngine.cursorY;
                if (cx === null || cy === null) return;
                const rawTime = st.chart.timeScale().coordinateToTime(cx);
                const price   = st.series.coordinateToPrice(cy);
                if (!rawTime || price === null) return;
                const time = typeof rawTime === "object" ? rawTime.timestamp : rawTime;
                if (typeof time !== "number") return;
                if (!DrawingController.getTempStart()) {
                    const startPoint = { time, price };
                    DrawingController.setTempStart(startPoint);
                    const preview = {
                        type: tool === "lineOverlay" ? "line" : "rect",
                        paneId: id, points: [startPoint, { ...startPoint }],
                        color: "#000000", width: 2,
                        ...(tool === "rectOverlay" ? { fillColor: "rgba(41,98,255,0.15)", showMidline: true, midColor: "#000000", midWidth: 1, extendRight: true } : {})
                    };
                    DrawingController.setPreviewLine(preview);
                    st.drawingEngine.addDrawing(preview); return;
                }
                const preview = DrawingController.getPreviewLine();
                preview.points[1] = { time, price };
                DrawingController.clearPreview(); DrawingController.resetTool(); st.drawingEngine.hideCursor();
                ["lineOverlayBtn","rectOverlayBtn","lineOverlayBtn2","rectOverlayBtn2"].forEach(id => {
                    const b = document.getElementById(id);
                    if (b) { b.style.background = ""; b.style.color = ""; }
                });
                StorageLayer.saveDrawings(id, layout, panesState, drawings);
                st.chart.applyOptions({ handleScroll: true, handleScale: true }); return;
            }
            if (tool === "hline") {
                const cy = st.drawingEngine.cursorY;
                if (cy === null) return;
                const price = st.series.coordinateToPrice(cy);
                if (price === null) return;
                addHorizontalLine(id, price);
                DrawingController.resetTool(); st.drawingEngine.hideCursor();
                updateToolButtonState(false);
                st.chart.applyOptions({ handleScroll: true, handleScale: true }); return;
            }
        }
        if (mobileEditMode) {
            if (mobileEditMode === "point" || mobileEditMode === "line") {
                DrawingController.stopDrag();
                StorageLayer.saveDrawings(id, layout, panesState, drawings);
            }
            if (mobileEditMode === "hline") {
                isDragging = false;
                StorageLayer.saveDrawings(id, layout, panesState, drawings);
            }
            st.chart.applyOptions({ handleScroll: true, handleScale: true });
            mobileEditMode = null; mobileEditPrevX = null; mobileEditPrevY = null;
            mobileEditStartX = null; mobileEditStartY = null;
        }
    });

    // Click handler
    st.chart.subscribeClick(param => {
        if (isMobile() && isDrawingActive()) return;

        // Time sync between panes
        if (syncEnabled && typeof param.time === "number") {
            const otherId = id === 1 ? 2 : 1;
            const other   = panesState[otherId];
            if (other?.chart && other.tfSeconds) {
                const visible = other.chart.timeScale().getVisibleRange();
                if (visible && (param.time < visible.from || param.time > visible.to)) {
                    other.chart.timeScale().setVisibleRange({
                        from: param.time - other.tfSeconds * 50,
                        to:   param.time + other.tfSeconds * 50
                    });
                }
            }
        }

        if (!param.point) return;

        // Overlay line selection
        if (DrawingController.getTool() === "idle") {
            const found = st.drawingEngine.hitTestLine(param.point.x, param.point.y);
            st.drawingEngine.drawings.forEach(d => d.selected = false);
            if (found) found.selected = true;
            st.drawingEngine.render();
        }

        if (DrawingController.getTool() === "lineOverlay") {
            const price = st.series.coordinateToPrice(param.point.y);
            if (price === null) return;
            const time = param.time;
            if (typeof time !== "number") return;
            if (!DrawingController.getTempStart()) {
                const startPoint = { time, price };
                DrawingController.setTempStart(startPoint);
                const preview = { type: "line", paneId: id, points: [startPoint, startPoint], color: "#000000", width: 2 };
                DrawingController.setPreviewLine(preview);
                st.drawingEngine.addDrawing(preview); return;
            }
            const preview = DrawingController.getPreviewLine();
            preview.points[1] = { time, price };
            DrawingController.clearPreview(); DrawingController.resetTool();
            StorageLayer.saveDrawings(id, layout, panesState, drawings);
            ["lineOverlayBtn","lineOverlayBtn2"].forEach(bid => {
                const b = document.getElementById(bid);
                if (b) { b.style.background = ""; b.style.color = ""; }
            });
            return;
        }

        if (DrawingController.getTool() === "rectOverlay") {
            const price = st.series.coordinateToPrice(param.point.y);
            if (price === null) return;
            let rawTime = param.time;
            if (!rawTime) return;
            const time = typeof rawTime === "object" ? rawTime.timestamp : rawTime;
            if (typeof time !== "number") return;
            if (!DrawingController.getTempStart()) {
                const startPoint = { time, price };
                DrawingController.setTempStart(startPoint);
                const preview = { type: "rect", paneId: id, points: [startPoint, startPoint], color: "#000000", width: 2, fillColor: "rgba(41,98,255,0.15)", showMidline: true, midColor: "#000000", midWidth: 1, extendRight: true };
                DrawingController.setPreviewLine(preview);
                st.drawingEngine.addDrawing(preview); return;
            }
            const preview = DrawingController.getPreviewLine();
            preview.points[1] = { time, price };
            DrawingController.clearPreview(); DrawingController.resetTool();
            StorageLayer.saveDrawings(id, layout, panesState, drawings);
            ["rectOverlayBtn","rectOverlayBtn2"].forEach(bid => {
                const b = document.getElementById(bid);
                if (b) { b.style.background = ""; b.style.color = ""; }
            });
            return;
        }

        if (DrawingController.getTool() === "posLong" || DrawingController.getTool() === "posShort") {
            const pprice = st.series.coordinateToPrice(param.point.y);
            if (pprice === null) return;
            let rawTime = param.time;
            if (!rawTime) return;
            const time = typeof rawTime === "object" ? rawTime.timestamp : rawTime;
            if (typeof time !== "number") return;
            const side = DrawingController.getTool() === "posLong" ? "long" : "short";
            st.drawingEngine.drawings.forEach(d => d.selected = false);
            const pos = PositionCalc.createPosition(side, id, time, pprice, currentSymbol);
            pos.selected = true;
            st.drawingEngine.addDrawing(pos);
            DrawingController.resetTool();
            StorageLayer.saveDrawings(id, layout, panesState, drawings);
            ["posBtn1","posBtn2"].forEach(bid => {
                const b = document.getElementById(bid);
                if (b) { b.style.background = ""; b.style.color = ""; }
            });
            return;
        }

        const price = st.series.coordinateToPrice(param.point.y);
        if (price === null) return;

        if (DrawingController.getTool() === "hline") {
            addHorizontalLine(id, price);
            DrawingController.resetTool(); updateToolButtonState(false);
            updateCursor(els.wrapper, "default"); return;
        }
        if (DrawingController.getTool() === "alert") {
            addAlertLine(id, price);
            DrawingController.resetTool();
            const alertBtn = document.getElementById("AlertBtn");
            if (alertBtn) { alertBtn.style.background = ""; alertBtn.style.color = ""; }
            return;
        }

        // hline hit test
        let found = null;
        drawings[id].forEach(obj => {
            const ly = st.series.priceToCoordinate(obj.price);
            if (ly !== null && Math.abs(ly - param.point.y) < 6) found = obj;
        });
        if (found) selectLine(found); else deselectLine();

        // Signal marker click — navigate to the signal that occupies this candle bucket
        // (на рэндж-ТФ маркеры не рисуются — там нет временных бакетов)
        if (_signalsVisible && st.tfSeconds && typeof param.time === "number" && DrawingController.getTool() === "idle") {
            const tf = st.tfSeconds;
            const clickedBucket = Math.floor(param.time / tf) * tf;
            const matchIdx = _signalLog.findLastIndex(s => {
                const snapped = Math.floor(s.time / tf) * tf;
                return s.symbol === currentSymbol && snapped === clickedBucket;
            });
            if (matchIdx !== -1) {
                _signalPanelIndex = matchIdx;
                renderSignalInPanel(_signalPanelIndex);
            }
        }
    });

    // Mouse move — overlay drag + hline drag
    function onMoveOverlay(e) {
        const coords = getEventCoords(e);
        if (DrawingController.isDragging()) {
            const draggedLine = DrawingController.getDraggedLine();
            const rect  = els.wrapper.getBoundingClientRect();
            const x = coords.clientX - rect.left, y = coords.clientY - rect.top;

            // ---- POSITION drag ----
            if (draggedLine && draggedLine.type === "position") {
                const handle = DrawingController.getPosHandle();
                const price  = st.series.coordinateToPrice(y);

                if (handle === "width") {
                    const xL = st.drawingEngine.timeMapper.getX(draggedLine.t1);
                    if (xL !== null) {
                        const barSpacing = st.chart.timeScale().options().barSpacing || 6;
                        let bars = Math.round((x - xL) / barSpacing);
                        if (bars < 3) bars = 3;
                        draggedLine.barsWidth = bars;
                    }
                } else if (handle === "body") {
                    if (price !== null && DrawingController.posDragStartPrice !== null) {
                        const dPrice = price - DrawingController.posDragStartPrice;
                        draggedLine.entry  = DrawingController.posOrig.entry  + dPrice;
                        draggedLine.stop   = DrawingController.posOrig.stop   + dPrice;
                        draggedLine.target = DrawingController.posOrig.target + dPrice;
                        const rawT = st.chart.timeScale().coordinateToTime(x);
                        if (rawT && DrawingController.posDragStartTime !== null) {
                            const t = typeof rawT === "object" ? rawT.timestamp : rawT;
                            if (typeof t === "number") {
                                draggedLine.t1 = DrawingController.posOrig.t1 + (t - DrawingController.posDragStartTime);
                            }
                        }
                    }
                } else if (price !== null) {
                    // entry / stop / target — двигаем только цену уровня
                    draggedLine[handle] = price;
                }
                st.drawingEngine.render();
                return;
            }

            let rawTime = st.chart.timeScale().coordinateToTime(x);
            const price = st.series.coordinateToPrice(y);
            if (!rawTime || price === null) return;
            const time = typeof rawTime === "object" ? rawTime.timestamp : rawTime;
            if (typeof time !== "number") return;
            const draggedPointIndex = DrawingController.getDraggedPointIndex();
            if (draggedPointIndex !== null) {
                draggedLine.points[draggedPointIndex] = { time, price };
                st.drawingEngine.render(); return;
            }
            const deltaTime  = time  - DrawingController.getDragStartTime();
            const deltaPrice = price - DrawingController.getDragStartPrice();
            draggedLine.points = DrawingController.originalPoints.map(p => ({ time: p.time + deltaTime, price: p.price + deltaPrice }));
            st.drawingEngine.render(); return;
        }
        if (DrawingController.getTool() !== "lineOverlay" && DrawingController.getTool() !== "rectOverlay") return;
        const tempStart = DrawingController.getTempStart();
        const preview   = DrawingController.getPreviewLine();
        if (!tempStart || !preview) return;
        const rect  = els.wrapper.getBoundingClientRect();
        const x = coords.clientX - rect.left, y = coords.clientY - rect.top;
        const price = st.series.coordinateToPrice(y);
        if (price === null) return;
        const time = st.chart.timeScale().coordinateToTime(x);
        if (time === null) return;
        preview.points[1] = { time, price };
        st.drawingEngine.render();
    }
    els.wrapper.addEventListener("mousemove", onMoveOverlay);

    function onMoveHLine(e) {
        const stLocal = panesState[id];
        if (!isDragging || !stLocal.selectedLine) return;
        const coords = getEventCoords(e);
        const rect   = els.wrapper.getBoundingClientRect();
        const y      = coords.clientY - rect.top;
        const newPrice = st.series.coordinateToPrice(y);
        if (newPrice === null) return;
        stLocal.selectedLine.price = newPrice;
        stLocal.selectedLine.line.applyOptions({ price: newPrice });
        if (stLocal.selectedLine.type === "alert") {
            panesState[id].ws.send(JSON.stringify({ type: "update_alert", symbol: currentSymbol, id: stLocal.selectedLine.id, price: newPrice }));
        }
    }
    els.wrapper.addEventListener("mousemove", onMoveHLine);

    // Context menu
    els.wrapper.addEventListener("contextmenu", e => {
        e.preventDefault();
        const rect = els.wrapper.getBoundingClientRect();
        const x = e.clientX - rect.left, y = e.clientY - rect.top;
        const overlayHit = st.drawingEngine.hitTestLine(x, y);
        if (overlayHit) {
            st.drawingEngine.drawings.forEach(d => d.selected = false);
            overlayHit.selected = true; st.drawingEngine.render();
            if (overlayHit.type === "position") {
                showPositionMenu(e.pageX, e.pageY, id, overlayHit);
            } else {
                showOverlayMenu(e.pageX, e.pageY, id, overlayHit);
            }
            return;
        }
        let found = null;
        drawings[id].forEach(obj => {
            const ly = st.series.priceToCoordinate(obj.price);
            if (ly !== null && Math.abs(ly - y) < 8) found = obj;
        });
        if (found) {
            selectLine(found);
            if (found.type === "alert") { showAlertMenu(e.pageX, e.pageY, id, found); return; }
            showOverlayMenu(e.pageX, e.pageY, id, found);
        } else {
            const price = st.series.coordinateToPrice(y);
            if (price !== null) showChartMenu(e.pageX, e.pageY, id, price);
        }
    });

    // mousedown — drag start (desktop)
    function onDownHLine(e) {
        if (isMobile()) return;
        const stLocal = panesState[id];
        if (!stLocal.selectedLine) return;
        const coords = getEventCoords(e);
        const rect   = els.wrapper.getBoundingClientRect();
        const y      = coords.clientY - rect.top;
        const lineY  = st.series.priceToCoordinate(stLocal.selectedLine.price);
        if (lineY === null) return;
        if (Math.abs(lineY - y) < 12) {
            isDragging = true;
            st.chart.applyOptions({ handleScroll: false, handleScale: false });
            updateCursor(els.wrapper, "ns-resize");
        }
    }
    els.wrapper.addEventListener("mousedown", onDownHLine);

    function onDownOverlay(e) {
        if (isMobile()) return;
        if (DrawingController.getTool() !== "idle") return;
        const coords = getEventCoords(e);
        const rect   = els.wrapper.getBoundingClientRect();
        const x = coords.clientX - rect.left, y = coords.clientY - rect.top;

        // ---- Position: хэндлы уровней / ширины ----
        const posHit = st.drawingEngine.hitTestPositionHandle(x, y);
        if (posHit) {
            st.drawingEngine.drawings.forEach(d => d.selected = false);
            posHit.obj.selected = true;
            DrawingController.startPosDrag(posHit.obj, posHit.handle);
            st.chart.applyOptions({ handleScroll: false, handleScale: false });
            st.drawingEngine.render();
            return;
        }

        const pointHit = st.drawingEngine.hitTestPoint(x, y);
        if (pointHit) {
            DrawingController.startDrag(pointHit.obj, null, null, pointHit.pointIndex);
            st.chart.applyOptions({ handleScroll: false, handleScale: false }); return;
        }
        const found = st.drawingEngine.hitTestLine(x, y);
        if (found && found.type === "position") {
            // перенос всей позиции целиком
            st.drawingEngine.drawings.forEach(d => d.selected = false);
            found.selected = true;
            DrawingController.startPosDrag(found, "body");
            DrawingController.posDragStartPrice = st.series.coordinateToPrice(y);
            const rawT = st.chart.timeScale().coordinateToTime(x);
            DrawingController.posDragStartTime = rawT ? (typeof rawT === "object" ? rawT.timestamp : rawT) : null;
            st.chart.applyOptions({ handleScroll: false, handleScale: false });
            st.drawingEngine.render();
            return;
        }
        if (!found) return;
        const projection = st.drawingEngine.getProjectionOnLine(found, x, y);
        if (!projection) return;
        const rawStart = st.chart.timeScale().coordinateToTime(projection.projX);
        if (!rawStart) return;
        const startTime  = typeof rawStart === "object" ? rawStart.timestamp : rawStart;
        const startPrice = st.series.coordinateToPrice(projection.projY);
        if (startPrice === null) return;
        DrawingController.startDrag(found, startTime, startPrice, null);
        st.chart.applyOptions({ handleScroll: false, handleScale: false });
    }
    els.wrapper.addEventListener("mousedown", onDownOverlay);

    function onUpOverlay() {
        if (isMobile()) return;
        if (!DrawingController.isDragging()) return;
        DrawingController.stopDrag();
        st.chart.applyOptions({ handleScroll: true, handleScale: true });
        StorageLayer.saveDrawings(id, layout, panesState, drawings);
    }
    els.wrapper.addEventListener("mouseup", onUpOverlay);

    function onUpHLine() {
        if (isMobile()) return;
        if (isDragging && panesState[id].selectedLine)
            StorageLayer.saveDrawings(id, layout, panesState, drawings);
        isDragging = false;
        st.chart.applyOptions({ handleScroll: true, handleScale: true });
        updateCursor(els.wrapper, "default");
    }
    els.wrapper.addEventListener("mouseup", onUpHLine);
}

// ============================================================================
// setTF
// ============================================================================
function setTF(paneId, tf) {
    const st = panesState[paneId];
    st.requestId++;
    st.rangePips = parseRangeTF(tf);
    // Для рэндж-ТФ tfSeconds = null: вся временная логика (таймер, бакеты
    // маркеров, crosshair-sync) обязана проверять его перед использованием.
    st.tfSeconds = st.rangePips ? null : TF_MAP[tf];
    if (st.drawingEngine) st.drawingEngine.setTimeframe(st.tfSeconds);
    if (st.chart) {
        // Сбросить перекрестие перед сменой ТФ: иначе при подмене данных на ТФ с
        // меньшим числом баров LWC дёргает устаревший логический индекс курсора
        // во время рассинхрона и бросает "Value is null" на каждое движение мыши.
        try { st.chart.clearCrosshairPosition(); } catch (e) {}
        st.chart.applyOptions({ timeScale:
            { secondsVisible: !st.tfSeconds || st.tfSeconds < 60 } });
    }
    layout[`pane${paneId}`].tf = tf;
    StorageLayer.autoSave(layout);
    DrawingController.resetTool();

    if (st.ws.readyState === WebSocket.OPEN) {
        st.ws.send(JSON.stringify({ type: "set_tf", symbol: currentSymbol, tf, requestId: st.requestId }));
    }
}

// ============================================================================
// switchSymbol
// ============================================================================
function switchSymbol(symbol) {
    currentSymbol = symbol;
    resetMarketDot();   // индикатор рынка — заново с тиков нового инструмента

    [1, 2].forEach(paneId => {
        const st = panesState[paneId];
        if (!st) return;
        drawings[paneId].forEach(obj => { if (obj.line) st.series.removePriceLine(obj.line); });
        if (st.drawingEngine) { st.drawingEngine.drawings = []; st.drawingEngine.render(); }
    });
    drawings[1] = []; drawings[2] = [];

    layout.symbol = symbol;
    StorageLayer.autoSave(layout);

    [1, 2].forEach(id => {
        const state = panesState[id];
        if (!state) return;
        state.indicatorsLoaded = false; // force reload on next history
        applyPriceFormat(id);           // precision нового символа
        const tf = layout[`pane${id}`]?.tf || "M1";
        const rs = state.ws && state.ws.readyState;

        if (rs === WebSocket.OPEN) {
            // Переиспользуем открытый сокет: set_tf несёт новый currentSymbol,
            // сервер обновляет привязку символа. Без teardown — нет предупреждения
            // "closed before connection established" и реконнект-шторма.
            setTF(id, tf);
        } else if (rs === WebSocket.CONNECTING) {
            // Сокет ещё открывается — его onopen сам запросит уже обновлённый
            // currentSymbol, пересоздавать не нужно.
        } else {
            // Только если сокет закрыт/закрывается — создаём заново.
            state.ws = new WebSocket(WS_URL);
            if (id === 1) ws1 = state.ws;
            if (id === 2) ws2 = state.ws;
            wireSocket(id, state, getPaneElements(id));
        }
    });
    refreshSignalMarkers();
    // Если панель брифинга открыта — перерендерить для нового символа
    if (briefVisible) renderBriefing();
}

// ============================================================================
// Layout / fullscreen / zoom
// ============================================================================
function toggleFull(id) {
    const column1 = document.getElementById("column1");
    const column2 = document.getElementById("column2");
    if (layout.split === "split") {
        if (id === 1) { column2.style.display = "none"; column1.style.flex = "1 1 100%"; layout.split = "leftFull"; }
        else          { column1.style.display = "none"; column2.style.flex = "1 1 100%"; layout.split = "rightFull"; }
    } else {
        column1.style.display = ""; column2.style.display = "";
        column1.style.flex = "1"; column2.style.flex = "1"; layout.split = "split";
    }
    StorageLayer.autoSave(layout);
    requestAnimationFrame(() => {
        document.body.offsetHeight;
        Object.keys(panesState).forEach(k => {
            const s = panesState[k];
            if (!s.chart) return;
            const div = document.getElementById(`chart${k}`);
            if (!div) return;
            s.chart.resize(div.clientWidth, div.clientHeight);
            // Канвас-оверлей рисования ресайзится только по window.resize, которого
            // при развороте нет — без этого канвас остаётся прежней ширины и режет
            // рисунки «невидимой стеной» по середине экрана.
            s.drawingEngine?.resize();
            applyBarCount(parseInt(k));
        });
    });
}

function autoScaleChart(id) {
    const st = panesState[id];
    if (!st?.chart) return;
    applyBarCount(id);
    st.chart.priceScale("right").applyOptions({ autoScale: true });
}

function applyBarCount(id) {
    const st = panesState[id];
    if (!st?.chart) return;
    const width = st.chart.timeScale().width();
    if (!width) return;
    st.chart.timeScale().applyOptions({ barSpacing: width / DEFAULT_BAR_COUNT });
}

function homeChart(id) {
    const st = panesState[id];
    if (!st?.chart) return;
    st.chart.timeScale().scrollToRealTime();
    st.chart.priceScale("right").applyOptions({ autoScale: true });
}

function zoomChart(id, direction) {
    const st = panesState[id];
    if (!st?.chart) return;
    const ts  = st.chart.timeScale();
    let next  = (ts.options().barSpacing || 6) + direction * 1;
    if (next < 1) next = 1;
    if (next > 80) next = 80;
    ts.applyOptions({ barSpacing: next });
}

function exportLayout() {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const date = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}_${pad(now.getHours())}-${pad(now.getMinutes())}-${pad(now.getSeconds())}`;
    const filename = `${currentSymbol.replace("/","")}_${layout.pane1.tf||"M1"}_${layout.pane2.tf||"M1"}_${layout.split}_${date}.json`;
    const blob = new Blob([JSON.stringify(layout, null, 2)], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
}

document.getElementById("importFile").onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => { localStorage.setItem("layoutState", reader.result); location.reload(); };
    reader.readAsText(file);
};

// ============================================================================
// Colors
// ============================================================================
// Создать главную серию нужного типа. BarSeries и CandlestickSeries — разные
// типы LWC, у уже созданной серии тип не меняется, поэтому смена типа = снос
// старой серии и создание новой (см. setChartType).
function makeSeries(chart, chartType) {
    const type = CHART_TYPES.includes(chartType) ? chartType : "candles";
    const ctor = type === "bars"
        ? LightweightCharts.BarSeries
        : LightweightCharts.CandlestickSeries;
    return chart.addSeries(
        ctor,
        { priceFormat: { type: 'price', precision: 5, minMove: 0.00001 } },
        0
    );
}

// Переключить тип отрисовки панели, перенеся данные, цвета, precision,
// индикаторную привязку, рисунки и сигнальные маркеры на новую серию.
function setChartType(paneId, chartType) {
    const st = panesState[paneId];
    if (!st || !st.chart) return;
    const type = CHART_TYPES.includes(chartType) ? chartType : "candles";
    layout[`pane${paneId}`] = layout[`pane${paneId}`] || {};
    if (layout[`pane${paneId}`].chartType === type && st.series) return;
    layout[`pane${paneId}`].chartType = type;
    StorageLayer.autoSave(layout);

    if (st.series) {
        try { st.chart.removeSeries(st.series); } catch (e) {}
        st.signalMarkers = null;   // плагин маркеров жил на старой серии
    }
    st.series = makeSeries(st.chart, type);
    if (st.data?.length) st.series.setData(st.data);

    // Перевесить всё, что держало ссылку на главную серию.
    if (st.drawingEngine)    st.drawingEngine.series    = st.series;
    if (st.indicatorManager) st.indicatorManager.candleSeries = st.series;

    applyPriceFormat(paneId);
    applyColors();
    refreshSignalMarkers();
    st.drawingEngine?.render();
    syncChartTypeButtons(paneId);
}

function applyColors() {
    Object.entries(panesState).forEach(([paneId, p]) => {
        if (!p.series) return;
        const type = layout[`pane${paneId}`]?.chartType || "candles";
        if (type === "bars") {
            // У BarSeries нет фитилей/границ — только up/down тела баров.
            p.series.applyOptions({
                upColor: layout.colors.up, downColor: layout.colors.down
            });
        } else {
            p.series.applyOptions({
                upColor: layout.colors.up, downColor: layout.colors.down,
                wickUpColor: layout.colors.wickUp, wickDownColor: layout.colors.wickDown,
                borderUpColor: layout.colors.up, borderDownColor: layout.colors.down
            });
        }
    });
}
function resetColors() {
    layout.colors = { ...DEFAULT_COLORS };
    applyColors(); StorageLayer.autoSave(layout);
}

// ============================================================================
// Signal panel
// ============================================================================
const signalAudio = new Audio("alert.mp3");
const _signalLog = [];
let _signalIdCounter = 0;
let _signalsVisible = false;
let _signalHideTimer = null;   // 5-min auto-hide for markers
let _skipHideTimer   = null;   // 15-sec auto-hide for SKIP panel only
let _signalPanelIndex = 0;

// Hide the panel overlay without touching marker visibility or btn state
function _signalClose() {
    const panel = document.getElementById("signalPanel");
    if (panel) panel.style.display = "none";
    if (_skipHideTimer) { clearTimeout(_skipHideTimer); _skipHideTimer = null; }
}

function clearSignalHideTimer() {
    if (_signalHideTimer) { clearTimeout(_signalHideTimer); _signalHideTimer = null; }
}

function resetSignalHideTimer() {
    clearSignalHideTimer();
    _signalHideTimer = setTimeout(hideSignalMarkers, 5 * 60 * 1000);
}

function showSignalMarkers() {
    _signalsVisible = true;
    const btn = document.getElementById("signalLogBtn");
    if (btn) { btn.style.background = "#2962FF"; btn.style.color = "#fff"; }
    refreshSignalMarkers();
    resetSignalHideTimer();
}

function hideSignalMarkers() {
    _signalsVisible = false;
    const btn = document.getElementById("signalLogBtn");
    if (btn) { btn.style.background = ""; btn.style.color = ""; }
    refreshSignalMarkers();
    clearSignalHideTimer();
    const panel = document.getElementById("signalPanel");
    if (panel) panel.style.display = "none";
}

function toggleSignalPanel() {
    if (_signalsVisible) {
        hideSignalMarkers();
    } else {
        if (_signalLog.length) renderSignalInPanel(_signalPanelIndex);
        showSignalMarkers();
    }
}

function getMarkersForPane(paneId) {
    const st = panesState[paneId];
    if (!st?.data?.length || !st.chart) return [];
    const tf = st.tfSeconds;
    // Рэндж-ТФ: у сигналов временные метки, снапить их не к чему — маркеров нет.
    if (!tf) return [];
    // Маркер ОБЯЗАН ложиться на точку шкалы: LightweightCharts при раскладке
    // маркеров зовёт timeToCoordinate(marker.time) и оборачивает результат в
    // ensureNotNull — для времени, которого нет на шкале, это бросает "Value is
    // null" (будущий бар, дыра по выходным, либо рассинхрон state.data и шкалы
    // после смены ТФ). Спрашиваем саму шкалу — это та же проверка, что внутри LWC.
    const tscale = st.chart.timeScale();
    return _signalLog
        .filter(s => s.symbol === currentSymbol)
        .map(s => {
            const snapped = Math.floor(s.time / tf) * tf;
            let coord = null;
            try { coord = tscale.timeToCoordinate(snapped); } catch (e) { coord = null; }
            if (coord === null) return null;
            return {
                time:     snapped,
                position: s.direction === "UP" ? "belowBar" : "aboveBar",
                color:    s.direction === "UP" ? "#26a69a" : "#ef5350",
                shape:    "circle",
                size:     1,
                id:       String(s.id),
            };
        })
        .filter(Boolean)
        .sort((a, b) => a.time - b.time);
}

function refreshSignalMarkers() {
    [1, 2].forEach(paneId => {
        const st = panesState[paneId];
        if (!st?.series) return;
        const markers = _signalsVisible ? getMarkersForPane(paneId) : [];
        // LightweightCharts v5 removed ISeriesApi.setMarkers — markers are now a
        // plugin created once per series via createSeriesMarkers(), then updated
        // through its own setMarkers(). The series persists across symbol switches
        // (only its data is replaced), so the primitive is created lazily and reused.
        try {
            if (!st.signalMarkers) {
                st.signalMarkers = LightweightCharts.createSeriesMarkers(st.series, markers);
            } else {
                st.signalMarkers.setMarkers(markers);
            }
        } catch (e) { console.error("signal markers failed:", e); }
    });
}

function navSignal(delta) {
    _signalPanelIndex = Math.max(0, Math.min(_signalLog.length - 1, _signalPanelIndex + delta));
    renderSignalInPanel(_signalPanelIndex);
}

function renderSignalInPanel(index) {
    const panel = document.getElementById("signalPanel");
    if (!panel || !_signalLog[index]) return;
    const entry = _signalLog[index];
    const data  = entry.fullData;

    const isUp  = data.direction === "UP";
    const color = isUp ? "#26a69a" : "#ef5350";
    const arrow = isUp ? "▲ UP" : "▼ DOWN";
    const sessionMap = { london:"Лондон", ny:"NY", asia:"Азия", asia_late:"Азия" };
    const session = sessionMap[data.session] || data.session;
    const hh = String(data.hour_utc).padStart(2,"0");
    const mm = String(data.min_in_hour).padStart(2,"0");
    const pct = data.display_pct || data.confidence;
    const hasMemory = data.winrate !== null && data.samples >= 15;

    const pctLine = hasMemory
        ? "<div style='font-size:11px;color:#aaa;margin-top:3px'>📊 Винрейт: <b style='color:" + color + "'>" + data.winrate + "%</b> <span style='color:#666'>(" + data.samples + ")</span></div>"
        : "<div style='font-size:11px;color:#666;margin-top:3px'>📊 score-based</div>";

    const symbolLink = "<span style='cursor:pointer;text-decoration:underline;pointer-events:all;' onclick='switchSymbol(\"" + data.symbol + "\")'>" + data.symbol + "</span>";

    const navHtml = _signalLog.length > 1
        ? "<div style='display:flex;align-items:center;justify-content:space-between;margin-top:6px;border-top:1px solid #333;padding-top:4px;pointer-events:all;'>" +
          "<button onclick='navSignal(-1)' style='background:none;border:none;color:#aaa;cursor:pointer;font-size:16px;pointer-events:all;'>←</button>" +
          "<span style='font-size:11px;color:#888;'>" + (index + 1) + " / " + _signalLog.length + "</span>" +
          "<button onclick='navSignal(+1)' style='background:none;border:none;color:#aaa;cursor:pointer;font-size:16px;pointer-events:all;'>→</button>" +
          "</div>"
        : "";

    panel.className = "";
    panel.classList.add(isUp ? "up" : "down");
    panel.style.display = "block";
    panel.innerHTML =
        "<span class='sig-close' onclick='_signalClose()'>✕</span>" +
        "<div style='font-size:17px;font-weight:bold;color:" + color + "'>" + arrow + " <span style='font-size:14px'>" + pct + "%</span></div>" +
        pctLine +
        "<div style='font-size:11px;color:#ccc;margin:5px 0 3px'>" + symbolLink + " | " + session + " | " + hh + ":" + mm + " UTC</div>" +
        "<div style='font-size:11px;color:#bbb;line-height:1.6'>" + (data.reason || []).join("<br>") + "</div>" +
        navHtml;
}

// Восстановить _signalLog из серверного реплея (type: "signals_history").
// Идемпотентно: дедупликация по time|symbol|direction, поэтому повторный
// запрос/гонка с живым сигналом не плодят дубликаты стрелок.
function applySignalsHistory(list) {
    if (!Array.isArray(list) || !list.length) return;
    const seen = new Set(_signalLog.map(s => s.time + "|" + s.symbol + "|" + s.direction));
    for (const s of list) {
        if (!s || s.direction === "SKIP") continue;
        const key = s.time + "|" + s.symbol + "|" + s.direction;
        if (seen.has(key)) continue;
        seen.add(key);
        _signalLog.push({
            id:        ++_signalIdCounter,
            time:      s.time,
            direction: s.direction,
            symbol:    s.symbol,
            fullData:  s.data,
        });
    }
    _signalLog.sort((a, b) => a.time - b.time);
    _signalPanelIndex = _signalLog.length - 1;
    if (_signalsVisible) refreshSignalMarkers();
}

function addSignalToLog(data) {
    if (data.direction === "SKIP") return;
    _signalLog.push({
        id:        ++_signalIdCounter,
        time:      Math.floor(Date.now() / 1000),
        direction: data.direction,
        symbol:    data.symbol,
        fullData:  data,
    });
    _signalPanelIndex = _signalLog.length - 1;
    showSignalMarkers();
    renderSignalInPanel(_signalPanelIndex);
}

function showSignal(data) {
    if (data.direction === "SKIP") {
        const panel = document.getElementById("signalPanel");
        if (!panel) return;
        if (_skipHideTimer) { clearTimeout(_skipHideTimer); _skipHideTimer = null; }
        panel.className = "skip";
        panel.style.display = "block";
        panel.innerHTML =
            "<span class='sig-close' onclick='_signalClose()'>✕</span>" +
            "<div style='font-size:12px;font-weight:bold;color:#888'>⏸ ПРОПУСК</div>" +
            "<div style='font-size:11px;color:#999;margin-top:4px'>" + (data.skip_reason || "") + "</div>";
        _skipHideTimer = setTimeout(_signalClose, 15000);
        return;
    }
    signalAudio.currentTime = 0; signalAudio.play().catch(() => {});
    addSignalToLog(data);
}
