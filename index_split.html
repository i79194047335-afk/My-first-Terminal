<script>
// ============================================================================
// Константы и дефолты
// ============================================================================
const TF_MAP = {
    S5:5, S10:10, S15:15, S30:30, M1:60, M3:180, M5:300, M15:900, H1:3600
};

const DEFAULT_BAR_COUNT = 122;
const RIGHT_OFFSET_BARS = 12;
const TZ_OFFSET = 5

const DEFAULT_COLORS = {
    up: "#26a69a",
    down: "#ef5350",
    wickUp: "#26a69a",
    wickDown: "#ef5350"
};

// ============================================================================
// STOCHASTIC CALCULATION
// ============================================================================
function calculateStochastic(data, period, smoothK, smoothD) {

    const rawK = [];

    for (let i = 0; i < data.length; i++) {

        if (i < period - 1) {
            rawK.push(null);
            continue;
        }

        const slice = data.slice(i - period + 1, i + 1);

        const lows = slice.map(c => c.low);
        const highs = slice.map(c => c.high);

        const lowest = Math.min(...lows);
        const highest = Math.max(...highs);

        const close = data[i].close;

        if (highest === lowest) {
            rawK.push(0);
            continue;
        }

        const k = 100 * (close - lowest) / (highest - lowest);
        rawK.push(k);
    }

    function sma(arr, length) {
        return arr.map((v, i) => {
            if (i < length - 1 || v === null) return null;

            const slice = arr.slice(i - length + 1, i + 1)
                .filter(x => x !== null);

            if (!slice.length) return null;

            return slice.reduce((a,b)=>a+b,0) / slice.length;
        });
    }

    const smoothedK = sma(rawK, smoothK);
    const d = sma(smoothedK, smoothD);

    return d;
}

function updateIndicator(priceState, pricePaneId) {

    const indicatorId = pricePaneId === 1 ? 3 : 4;
    const ind = indicatorState[indicatorId];

    if (!ind || !priceState.data?.length) return;

    const data = priceState.data;

    if (data.length < 20) return;

    const lastIndex = data.length - 1;

if (!ind.initialized) {

    const fast = calculateStochastic(data, 14, 2, 2);
	const slow = calculateStochastic(data, 84, 12, 12);

    const fastData = [];

    for (let i = 0; i < data.length; i++) {
        fastData.push({
            time: data[i].time,
            value: fast[i] ?? null
        });
    }

    ind.fastSeries.setData(fastData);
	
	const slowData = [];

for (let i = 0; i < data.length; i++) {
    slowData.push({
        time: data[i].time,
        value: slow[i] ?? null
    });
}

ind.slowSeries.setData(slowData);

	
    ind.initialized = true;

} else {

    const i = data.length - 1;

    if (i < 13) return;

    const slice = data.slice(i - 13, i + 1);

    const lows = slice.map(c => c.low);
    const highs = slice.map(c => c.high);

    const lowest = Math.min(...lows);
    const highest = Math.max(...highs);

    const close = data[i].close;

    let k = 0;

    if (highest !== lowest) {
        k = 100 * (close - lowest) / (highest - lowest);
    }

    ind.fastSeries.update({
        time: data[i].time,
        value: k
    });
	const last = priceState.lastCandle;
const current = data[data.length - 1];

// обновляем медленный стох только при новой свече
if (!last || last.time !== current.time) {

    const slow = calculateStochastic(data, 82, 12, 12);
const slowLast = slow[slow.length - 1];

if (slowLast != null) {
    ind.slowSeries.update({
        time: current.time,
        value: slowLast
    });
}


}


}

}


// ============================================================================
// Глобальное состояние
// ============================================================================

const layout = StorageLayer.loadLayout(DEFAULT_COLORS);
const panes = [1, 2];

if (!layout.symbol) {
    layout.symbol = "AUD/USD";
}

let currentSymbol = layout.symbol;


// Indicator panes (без WS, без инструментов)
const indicatorPanes = [3, 4];

const indicatorState = {};

const panesState = {}; // будет заполняться в createPane

const drawings = { 1: [], 2: [] };
const pendingAlerts = {};

let ws1 = null;
let ws2 = null;


let isDragging = false;
let contextLinePane = null;
let contextLineObject = null;
let syncEnabled = true; // по умолчанию как сейчас



// ============================================================================
// Утилиты
// ============================================================================

function getPaneElements(id) {
    return {
        wrapper: document.getElementById(`wrapper${id}`),
        chartDiv: document.getElementById(`chart${id}`),
        tfSelect: document.getElementById(`tf${id}`),
        countdown: document.getElementById(`countdown${id}`)
    };
}

function updateCursor(el, type) {
    el.style.cursor = type;
}

function deselectLine() {
    Object.values(panesState).forEach(st => {
        if (st.selectedLine) {
            st.selectedLine.line.applyOptions({
                color: st.selectedLine.color,
                lineWidth: st.selectedLine.width
            });
            st.selectedLine = null;
        }
    });
}


function selectLine(obj) {
    deselectLine();

    const st = panesState[obj.paneId];
    st.selectedLine = obj;

    obj.line.applyOptions({ color: "#2962FF" });
}

function addHorizontalLine(id, price) {
    const { series } = panesState[id];
    const line = series.createPriceLine({
        price,
        color: "#000000",
        lineWidth: 2,
        lineStyle: LightweightCharts.LineStyle.Solid,
        axisLabelVisible: true
    });

    const obj = {
        paneId: id,
        type: "hline",
        price,
        line,
        color: "#000000",
        width: 2
    };

    drawings[id].push(obj);
    StorageLayer.saveDrawings(id, layout, panesState, drawings);
    return obj;

}

function addAlertLine(id, price) {

    const { series } = panesState[id];

    const line = series.createPriceLine({
    price: price,
    color: "#000000",
    lineWidth: 1,
    lineStyle: LightweightCharts.LineStyle.Dashed,
    axisLabelVisible: true,
    title: "🔔"
});


    const obj = {
    id: null,
    paneId: id,
    type: "alert",
    price: price,
    symbol: currentSymbol,
    triggered: false,
    line: line
};


	pendingAlerts[price] = obj;
    drawings[id].push(obj);

    // отправка на сервер
   panesState[id].ws.send(JSON.stringify({
        type: "add_alert",
        symbol: currentSymbol,
        price: price
    }));

    StorageLayer.saveDrawings(id, layout, panesState, drawings);

}


// ============================================================================
// TOUCH HELPER — унифицирует mouse и touch события
// ============================================================================
function getEventCoords(e) {
    if (e.touches && e.touches.length > 0) {
        return { clientX: e.touches[0].clientX, clientY: e.touches[0].clientY };
    }
    if (e.changedTouches && e.changedTouches.length > 0) {
        return { clientX: e.changedTouches[0].clientX, clientY: e.changedTouches[0].clientY };
    }
    return { clientX: e.clientX, clientY: e.clientY };
}

// Блокируем скролл графика когда активен инструмент рисования или drag
function isDrawingActive() {
    const tool = DrawingController.getTool();
    return tool !== "idle" || DrawingController.isDragging();
}

// ============================================================================
// Создание одной панели (теперь намного чище)
// ============================================================================
function createPane(id) {
    const els = getPaneElements(id);
	els.tfSelect.addEventListener("keydown", e => {

    if (e.key === "ArrowUp" || e.key === "ArrowDown") {
        e.preventDefault();
    }

});


    const state = panesState[id] = {
    chart: null,
    series: null,
    lastCandle: null,
    requestId: 0,
    ws: new WebSocket(`ws://155.212.219.59:8765`),
    tfSeconds: TF_MAP[layout[`pane${id}`]?.tf || "M1"],
    selectedLine: null,
    data: [],  // ← ДОБАВИТЬ ЭТУ СТРОКУ
	syncBound: false
};

    if (id === 1) ws1 = state.ws;
    if (id === 2) ws2 = state.ws;

    // Заполняем select
    Object.keys(TF_MAP).forEach(tf => {
        const opt = document.createElement("option");
        opt.value = tf;
        opt.text = tf;
        els.tfSelect.appendChild(opt);
    });
    els.tfSelect.value = layout[`pane${id}`]?.tf || "M1";

    // WebSocket
    state.ws.onopen = () => {
        setTF(id, els.tfSelect.value);
    };

    state.ws.onmessage = e => {
				
        const msg = JSON.parse(e.data);

if (
    msg.type !== "alert" &&
    msg.type !== "alert_created" &&
    msg.type !== "analysis" &&
    msg.requestId !== state.requestId
) return;



       if (msg.type === "history") {

    // создаём chart только один раз
    if (!state.chart) {
        createChartInternal(id, state.tfSeconds);
    }

   if (msg.data?.length) {
    state.data = msg.data;
	state.series.setData(state.data);
	updateIndicator(state, id);
    state.lastCandle = msg.data.at(-1);

}
    StorageLayer.restoreDrawings(id, layout, panesState, drawings);

    
setTimeout(() => {

    state.chart.resize(
        els.chartDiv.clientWidth,
        els.chartDiv.clientHeight
    );

    applyBarCount(id);
    state.chart.timeScale().scrollToRealTime();

}, 120);


    state.drawingEngine?.render();
}

        if (msg.type === "update" && msg.candle) {
            state.series.update(msg.candle);
			
			if (msg.type === "analysis") {

		updateMarketEngine(msg);

	}
	if (msg.type === "signal") {
    showSignal(msg);
}

			// обновляем локальный массив
			const last = state.data[state.data.length - 1];

			if (last && last.time === msg.candle.time) {
				state.data[state.data.length - 1] = msg.candle;
			} else {

				state.data.push(msg.candle);

				if (state.data.length > 30000) {
					state.data.shift();
				}
			}

			updateIndicator(state, id);
            state.lastCandle = msg.candle;
        }
		
		if (msg.type === "analysis") {

    updateMarketEngine(msg);

}

		if (msg.type === "alert" && msg.symbol === currentSymbol) {

    playAlertSound();

    showAlertPopup(msg.symbol + " @ " + msg.price);

function onDownOverlay(e) {
if (isMobile()) return;
if (DrawingController.getTool() !== "idle") return;

const coords = getEventCoords(e);
const rect = els.wrapper.getBoundingClientRect();
const x = coords.clientX - rect.left;
const y = coords.clientY - rect.top;

const pointHit = st.drawingEngine.hitTestPoint(x, y);
if (pointHit) {
    DrawingController.startDrag(pointHit.obj, null, null, pointHit.pointIndex);
    st.chart.applyOptions({ handleScroll: false, handleScale: false });
    return;
}

const found = st.drawingEngine.hitTestLine(x, y);
if (!found) return;

const projection = st.drawingEngine.getProjectionOnLine(found, x, y);
if (!projection) return;

const rawStart = st.chart.timeScale().coordinateToTime(projection.projX);
if (!rawStart) return;
const startTime  = typeof rawStart === "object" ? rawStart.timestamp : rawStart;
const startPrice = st.series.coordinateToPrice(projection.projY);
if (startPrice === null) return;

DrawingController.startDrag(found, startTime, startPrice, null);
st.chart.applyOptions({ handleScroll: false, handleScale: false });
}

    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
}

    const current = ts.options().barSpacing || 6;

let _lastSignalTs = 0;

function showSignal(data) {
    const panel = document.getElementById("signalPanel");
    if (!panel) return;

    // клиентский cooldown 60 сек — не обновлять панель если новый сигнал слабее
    const now = Date.now();
    if (data.direction !== "SKIP" && now - _lastSignalTs < 60000) return;
    if (data.direction !== "SKIP") _lastSignalTs = now;

    panel.className = "";
    panel.style.display = "block";

    if (data.direction === "SKIP") {
        panel.classList.add("skip");
        panel.innerHTML =
            "<div style='font-size:13px;font-weight:bold;color:#888'>⏸ ПРОПУСК</div>" +
            "<div style='font-size:11px;color:#999;margin-top:6px'>" +
            (data.skip_reason || "") + "</div>";
        return;
    }

    const isUp  = data.direction === "UP";
    const color = isUp ? "#26a69a" : "#ef5350";
    const arrow = isUp ? "▲ UP" : "▼ DOWN";

    const sessionMap = { london:"Лондон", ny:"NY", asia:"Азия", asia_late:"Азия" };
    const session = sessionMap[data.session] || data.session;
    const hh = String(data.hour_utc).padStart(2,"0");
    const mm = String(data.min_in_hour).padStart(2,"0");

    // Показываем реальный винрейт если есть, иначе confidence
    const pct      = data.display_pct || data.confidence;
    const hasMemory = data.winrate !== null && data.samples >= 15;

    // Строка с процентом и источником
    let pctLine = "";
    if (hasMemory) {
        pctLine =
            "<div style='font-size:11px;color:#aaa;margin-top:3px'>" +
            "📊 Винрейт: <b style='color:" + color + "'>" + data.winrate + "%</b>" +
            " <span style='color:#666'>(" + data.samples + " паттернов)</span>" +
            "</div>";
    } else {
        pctLine =
            "<div style='font-size:11px;color:#666;margin-top:3px'>" +
            "📊 Памяти нет — score-based" +
            "</div>";
    }

    const reasons = (data.reason || []).join("<br>");

    panel.classList.add(isUp ? "up" : "down");

    panel.innerHTML =
        "<div style='font-size:20px;font-weight:bold;color:" + color + "'>" +
            arrow + " <span style='font-size:15px'>" + pct + "%</span>" +
        "</div>" +
        pctLine +
        "<div style='font-size:11px;color:#ccc;margin:6px 0 4px'>" +
            data.symbol + " | " + session + " | " + hh + ":" + mm + " UTC" +
        "</div>" +
        "<div style='font-size:11px;color:#bbb;line-height:1.7;margin-top:4px'>" +
            reasons +
        "</div>";

    signalAudio.currentTime = 0;
    signalAudio.play().catch(() => {});
}



let indicatorMode = "engine";
let lastSignal = null;
let lastSignalTime = 0;
const SIGNAL_COOLDOWN = 30000; // 30 секунд

// ============================================================
// MOBILE TAB SWITCHING
// ============================================================
let currentMobileTab = 1;

function isMobile() {
    return window.innerWidth <= 768;
}

function switchMobileTab(tabNum) {
    if (!isMobile()) return;

    currentMobileTab = tabNum;

    const col1 = document.getElementById("column1");
    const col2 = document.getElementById("column2");
    const tab1 = document.getElementById("mobTab1");
    const tab2 = document.getElementById("mobTab2");

    if (tabNum === 1) {
        col1.classList.add("mob-active");
        col2.classList.remove("mob-active");
        tab1.classList.add("active");
        tab2.classList.remove("active");
    } else {
        col2.classList.add("mob-active");
        col1.classList.remove("mob-active");
        tab2.classList.add("active");
        tab1.classList.remove("active");
    }

    // Ресайз после перерисовки DOM
    requestAnimationFrame(() => {
        document.body.offsetHeight; // force reflow

        [1, 2, 3, 4].forEach(k => {
            const div = document.getElementById(`chart${k}`);
            if (!div) return;

            const st = panesState[k];
            if (st && st.chart) {
                st.chart.resize(div.clientWidth, div.clientHeight);
            }

            const ind = indicatorState[k];
            if (ind && ind.chart) {
                ind.chart.resize(div.clientWidth, div.clientHeight);
            }
        });
    });
}

function initMobileLayout() {
    if (!isMobile()) return;

    const col1 = document.getElementById("column1");
    const col2 = document.getElementById("column2");

    // По умолчанию показываем первую вкладку
    col1.classList.add("mob-active");
    col2.classList.remove("mob-active");
}

function toggleMobileLayout(e) {
    if (e) e.stopPropagation();
    const dd = document.getElementById("layoutDropdown");
    if (!dd) return;

    if (dd.style.display === "block") {
        dd.style.display = "none";
    } else {
        dd.style.display  = "block";
        dd.style.position = "fixed";
        dd.style.bottom   = "52px";
        dd.style.right    = "4px";
        dd.style.zIndex   = "99999";

        // Останавливаем клики внутри дропдауна чтобы не закрывался сразу
        dd.onclick = ev => ev.stopPropagation();
    }
}

// При повороте экрана — ресайзим активный граф
window.addEventListener("resize", () => {
    if (isMobile()) {
        switchMobileTab(currentMobileTab);
    }
});


function setIndicatorMode(mode) {

    indicatorMode = mode;

}

function updateMarketEngine(data) {

    if (indicatorMode !== "engine") return;

    const pressure = Math.round((data.pressure || 0.5) * 100);
    const probUp = Math.round((data.prob_up || 0.5) * 100);
    const probDown = Math.round((data.prob_down || 0.5) * 100);

    const velocity = (data.velocity || 0).toFixed(5);
    const accel = (data.acceleration || 0).toFixed(5);
    const tickRate = (data.tick_rate || 0).toFixed(2);
    const rangePos = Math.round((data.range_pos || 0.5) * 100);

    const samples = data.samples || 0;
    const trend = data.micro_trend || "flat";

    const now = Date.now();

    // ============================
    // SIGNAL DETECTION
    // ============================

    let signal = "нет сигнала";
    let signalStrength = "";

    if (samples > 60) {

        if (probUp > 55 && pressure > 55) {
            signal = "BUY";
        }

        if (probDown > 55 && pressure < 45) {
            signal = "SELL";
        }

    }

    // ============================
    // SIGNAL STRENGTH
    // ============================

    if (signal !== "нет сигнала") {

        if (samples > 200 && Math.max(probUp, probDown) > 70) {
            signalStrength = "ORACLE";
        }
        else if (samples > 150) {
            signalStrength = "СИЛЬНЫЙ";
        }
        else if (samples > 100) {
            signalStrength = "СРЕДНИЙ";
        }
        else {
            signalStrength = "СЛАБЫЙ";
        }

    }

    // ============================
    // SIGNAL COOLDOWN
    // ============================

    if (signal !== "нет сигнала") {

        if (
            signal === lastSignal &&
            now - lastSignalTime < SIGNAL_COOLDOWN
        ) {
            signal = "нет сигнала";
        }
        else {
            lastSignal = signal;
            lastSignalTime = now;
        }

    }

    // ============================
    // PANEL TEXT
    // ============================

    const text =
        "<b>MARKET ENGINE</b><br><br>" +

        "Micro trend: " + trend + "<br>" +
        "Pressure BUY: " + pressure + "%<br>" +
        "Range position: " + rangePos + "%<br><br>" +

        "Velocity: " + velocity + "<br>" +
        "Acceleration: " + accel + "<br>" +
        "Tick rate: " + tickRate + "<br><br>" +

        "<b>AI Prediction</b><br>" +
        "UP: " + probUp + "%<br>" +
        "DOWN: " + probDown + "%<br>" +
        "Samples: " + samples + "<br><br>" +

        "<b>СИГНАЛ</b>: " + signal + "<br>" +
        "Сила: " + signalStrength;

    //const p1 = document.getElementById("enginePanel1");//
    //const p2 = document.getElementById("enginePanel2");//

    //if (p1) p1.innerHTML = text;//
    //if (p2) p2.innerHTML = text;//
}
