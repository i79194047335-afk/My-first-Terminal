<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="4" fill="#1a1a2e"/>
  <!-- green candle -->
  <rect x="7" y="8" width="4" height="12" fill="#00c853" rx="0.5"/>
  <line x1="9" y1="5" x2="9" y2="8" stroke="#00c853" stroke-width="1.5"/>
  <line x1="9" y1="20" x2="9" y2="24" stroke="#00c853" stroke-width="1.5"/>
  <!-- red candle -->
  <rect x="13" y="10" width="4" height="10" fill="#ff1744" rx="0.5"/>
  <line x1="15" y1="6" x2="15" y2="10" stroke="#ff1744" stroke-width="1.5"/>
  <line x1="15" y1="20" x2="15" y2="27" stroke="#ff1744" stroke-width="1.5"/>
  <!-- green candle -->
  <rect x="19" y="6" width="4" height="14" fill="#00c853" rx="0.5"/>
  <line x1="21" y1="3" x2="21" y2="6" stroke="#00c853" stroke-width="1.5"/>
  <line x1="21" y1="20" x2="21" y2="23" stroke="#00c853" stroke-width="1.5"/>
  <!-- trend line -->
  <line x1="6" y1="22" x2="26" y2="8" stroke="#448aff" stroke-width="0.8" opacity="0.5"/>
</svg>
